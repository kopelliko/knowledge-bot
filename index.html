<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内ナレッジBot</title>
<meta name="theme-color" content="#1D9E75">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
#chat-wrap { display: flex; flex-direction: column; width: 100%; max-width: 680px; height: 90vh; max-height: 800px; background: #f5f5f0; border-radius: 16px; overflow: hidden; border: 0.5px solid #e0e0d8; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
#chat-header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; font-weight: 600; flex-shrink: 0; }
.bot-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.bot-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
.bot-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; }
#messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
.avatar.bot { background: #1D9E75; color: white; }
.avatar.user { background: #e8f0fe; color: #2a6fdb; }
.bubble { max-width: 82%; padding: 10px 14px; font-size: 14px; line-height: 1.75; color: #1a1a1a; }
.bubble.bot { background: #fff; border: 0.5px solid #e8e8e0; border-radius: 4px 16px 16px 16px; }
.bubble.user { background: #1D9E75; color: white; border-radius: 16px 4px 16px 16px; }
.manual-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #E1F5EE; border: 0.5px solid #5DCAA5; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 500; color: #0F6E56; text-decoration: none; transition: background 0.15s; }
.manual-link:hover { background: #9FE1CB; }
.canva-wrap { margin-top: 12px; border-radius: 8px; overflow: hidden; position: relative; width: 100%; height: 0; padding-top: 56.25%; box-shadow: 0 2px 8px rgba(63,69,81,0.16); }
.canva-wrap iframe { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; }
.canva-note { font-size: 12px; color: #888; margin-top: 6px; }
.step-list { margin: 8px 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
.step-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: #1D9E75; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
.choices { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
.choice-btn { background: #f8f8f4; border: 0.5px solid #ddddd5; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #1a1a1a; cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 8px; font-family: inherit; }
.choice-btn:hover { background: #eef8f4; border-color: #1D9E75; }
.choice-btn.free { border-style: dashed; color: #666; }
.choice-btn.free:hover { border-color: #1D9E75; color: #1a1a1a; }
.badge-wip { margin-left: auto; font-size: 10px; padding: 2px 7px; background: #fff8e6; color: #b07d00; border-radius: 99px; border: 0.5px solid #f0d080; white-space: nowrap; }
.num { width: 22px; height: 22px; border-radius: 50%; background: #E1F5EE; color: #0F6E56; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.num.back { background: #f0f0ec; color: #888; }
.num.free-icon { background: #f0f0ec; color: #888; font-size: 15px; }
.typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
#input-area { background: #fff; border-top: 0.5px solid #e0e0d8; padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
#user-input { flex: 1; border: 0.5px solid #ddddd5; border-radius: 20px; padding: 9px 16px; font-size: 14px; resize: none; min-height: 40px; max-height: 100px; color: #1a1a1a; background: #f8f8f4; font-family: inherit; outline: none; transition: border-color 0.15s; }
#user-input:focus { border-color: #1D9E75; }
#user-input::placeholder { color: #bbb; }
#send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
#send-btn:hover { background: #0F6E56; }
#send-btn svg { width: 17px; height: 17px; fill: white; }
@media (max-width: 480px) { body{padding:0;} #chat-wrap{height:100vh;max-height:100vh;border-radius:0;border:none;} }
</style>
</head>
<body>
<div id="chat-wrap">
  <div id="chat-header">
    <div class="bot-avatar">KB</div>
    <div>
      <div class="bot-name">社内ナレッジBot</div>
      <div class="bot-status">オンライン</div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="質問を直接入力..." rows="1"></textarea>
    <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
  </div>
</div>
<script>
const flows = {
  start: {
    text: "こんにちは！\n何について調べますか？",
    choices: [
      { label: '発送', next: 'dept_発送' },
      { label: '納品', next: 'dept_納品' },
      { label: 'B.O', next: 'dept_B_O' },
      { label: '自由に質問する', next: 'free_input', free: true }
    ]
  },
  dept_発送: {
    text: '発送の何について知りたいですか？',
    choices: [
      { label: '発送業務', next: 'cat_発送_発送業務' },
      { label: 'ラクマ出品', next: 'cat_発送_ラクマ出品' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_発送_発送業務: {
    text: '発送業務の何について知りたいですか？',
    choices: [
      { label: '梱包作業前の作業', next: 'wip', wip: true },
      { label: '梱包作業(スムースEC)', next: 'wip', wip: true },
      { label: '梱包後の作業', next: 'wip', wip: true },
      { label: '発送に戻る', next: 'dept_発送', back: true }
    ]
  },
  cat_発送_ラクマ出品: {
    text: 'ラクマ出品の何について知りたいですか？',
    choices: [
      { label: '出品方法', next: 'wip', wip: true },
      { label: '値付け方法', next: 'wip', wip: true },
      { label: '発送方法', next: 'wip', wip: true },
      { label: '発送に戻る', next: 'dept_発送', back: true }
    ]
  },
  dept_納品: {
    text: '納品の何について知りたいですか？',
    choices: [
      { label: '納品作業', next: 'cat_納品_納品作業' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_納品_納品作業: {
    text: '納品作業の何について知りたいですか？',
    choices: [
      { label: '納品作業', next: 'wip', wip: true },
      { label: '納品後のパソコン作業', next: 'wip', wip: true },
      { label: '在庫管理シールの使い方', next: 'wip', wip: true },
      { label: '納品に戻る', next: 'dept_納品', back: true }
    ]
  },
  dept_B_O: {
    text: 'B.Oの何について知りたいですか？',
    choices: [
      { label: '楽天設定', next: 'cat_B_O_楽天設定' },
      { label: 'ヤフショ設定', next: 'cat_B_O_ヤフショ設定' },
      { label: '楽天/ヤフショ共通', next: 'cat_B_O_楽天_ヤフショ共通' },
      { label: '出品作業', next: 'cat_B_O_出品作業' },
      { label: 'クロスモール', next: 'cat_B_O_クロスモール' },
      { label: 'その他', next: 'cat_B_O_その他' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_B_O_楽天設定: {
    text: '楽天設定の何について知りたいですか？',
    choices: [
      { label: 'ポイント変倍設定', next: 'item_ポイント変倍設定' },
      { label: 'キャッシュバックキャンペーン設定', next: 'wip', wip: true },
      { label: 'クーポン設定', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  item_ポイント変倍設定: {
    get html() { return canvaEmbed('<div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHDm-nWrtE/eRfp7UqE5-Iet4ES_qkNfQ/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
豊島 浩太さんによる<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHDm-nWrtE&#x2F;eRfp7UqE5-Iet4ES_qkNfQ&#x2F;view?utm_content=DAHDm-nWrtE&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">【楽天】ポイント変倍の設定</a>'); },
    choices: [
      { label: '楽天設定に戻る', next: 'cat_B_O_楽天設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_B_O_ヤフショ設定: {
    text: 'ヤフショ設定の何について知りたいですか？',
    choices: [
      { label: 'ボーナスストア', next: 'item_ボーナスストア' },
      { label: 'LINE配信', next: 'item_LINE配信' },
      { label: 'クーポン', next: 'item_クーポン' },
      { label: '爆買いWEEK', next: 'wip', wip: true },
      { label: 'あなただけのタイムセール', next: 'wip', wip: true },
      { label: '広告のブースト', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  item_ボーナスストア: {
    get html() { return ml('https://canva.link/dyu5a2bzy5iodfi', 'ボーナスストアマニュアルを開く') + canvaEmbed('<div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHBKNpKxMg/LI4UkYGyrV4JL-EZ4H-2Sg/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
豊島 浩太さんによる<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHBKNpKxMg&#x2F;LI4UkYGyrV4JL-EZ4H-2Sg&#x2F;view?utm_content=DAHBKNpKxMg&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">【ヤフショ】ボーナスストアへの参加</a>'); },
    choices: [
      { label: 'ヤフショ設定に戻る', next: 'cat_B_O_ヤフショ設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  item_LINE配信: {
    get html() { return canvaEmbed('<div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHBR9YM2JY/FSE1zLlV5Gbhrt-wasYD-w/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
豊島 浩太さんによる<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHBR9YM2JY&#x2F;FSE1zLlV5Gbhrt-wasYD-w&#x2F;view?utm_content=DAHBR9YM2JY&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">【ヤフショ】LINE配信設定</a>'); },
    choices: [
      { label: 'ヤフショ設定に戻る', next: 'cat_B_O_ヤフショ設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  item_クーポン: {
    get html() { return ml('https://canva.link/628tl4m1o1hf2cd', 'クーポンマニュアルを開く'); },
    choices: [
      { label: 'ヤフショ設定に戻る', next: 'cat_B_O_ヤフショ設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_B_O_楽天_ヤフショ共通: {
    text: '楽天/ヤフショ共通の何について知りたいですか？',
    choices: [
      { label: 'LINEお友達追加クーポン', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  cat_B_O_出品作業: {
    text: '出品作業の何について知りたいですか？',
    choices: [
      { label: '手順①商品バリエーションの決定', next: 'wip', wip: true },
      { label: '手順②棚・棚番の作成', next: 'wip', wip: true },
      { label: '手順③出品登録の準備', next: 'wip', wip: true },
      { label: '手順④商品画像作成', next: 'wip', wip: true },
      { label: '手順⑤出品登録', next: 'wip', wip: true },
      { label: '手順⑥在庫連動の設定', next: 'wip', wip: true },
      { label: '手順⑦広告の除外', next: 'wip', wip: true },
      { label: '手順⑧最終確認', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  cat_B_O_クロスモール: {
    text: 'クロスモールの何について知りたいですか？',
    choices: [
      { label: '当日の注文キャンセル方法', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  cat_B_O_その他: {
    text: 'その他の何について知りたいですか？',
    choices: [
      { label: '不正注文の取り戻し請求', next: 'wip', wip: true },
      { label: 'B.Oに戻る', next: 'dept_B_O', back: true }
    ]
  },
  wip: { text: 'このナレッジは現在準備中です。\n担当部署に直接ご確認ください。', choices: [{ label: '最初に戻る', next: 'start', back: true }] },
  free_input: { text: 'どんなことでも自由に入力してください。', choices: [{ label: '最初に戻る', next: 'start', back: true }] }
};

const LSVG = '<svg viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zm-1 3H5a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-8h-2v8H5V8h8V6z"/></svg>';
const ml = (url, label) => '<a class="manual-link" href="' + url + '" target="_blank">' + LSVG + label + '</a>';
const canvaEmbed = (src) => src ? '<div class="canva-wrap"><iframe loading="lazy" src="' + src + '" allowfullscreen allow="fullscreen"></iframe></div><p class="canva-note">スライドをスクロールして該当ページをご確認ください</p>' : '';

const messagesEl = document.getElementById('messages');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const scrollBottom = () => messagesEl.scrollTop = messagesEl.scrollHeight;

function showTyping() {
  const row = document.createElement('div'); row.className='msg-row bot'; row.id='typing-row';
  const av = document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
  const b = document.createElement('div'); b.className='bubble bot';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}
function removeTyping() { const t=document.getElementById('typing-row'); if(t) t.remove(); }

function addUserMsg(text) {
  const row=document.createElement('div'); row.className='msg-row user';
  const av=document.createElement('div'); av.className='avatar user'; av.textContent='あ';
  const b=document.createElement('div'); b.className='bubble user'; b.style.whiteSpace='pre-line'; b.textContent=text;
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}

function makeChoices(flow, b) {
  if (!flow.choices || !flow.choices.length) return;
  const choicesEl = document.createElement('div'); choicesEl.className='choices';
  flow.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    if (c.wip) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+( i+1)+'</span>'+c.label+'<span class="badge-wip">準備中</span>';
      btn.addEventListener('click', () => { addUserMsg(c.label); showFlow('wip'); });
    } else if (c.free) {
      btn.className='choice-btn free';
      btn.innerHTML='<span class="num free-icon">✎</span>'+c.label;
      btn.addEventListener('click', () => { addUserMsg(c.label); showFlow('free_input'); setTimeout(()=>input.focus(),700); });
    } else if (c.back) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num back">←</span>'+c.label;
      btn.addEventListener('click', () => { addUserMsg(c.label); showFlow(c.next); });
    } else {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+(i+1)+'</span>'+c.label;
      btn.addEventListener('click', () => { addUserMsg(c.label); showFlow(c.next); });
    }
    choicesEl.appendChild(btn);
  });
  b.appendChild(choicesEl);
}

function showFlow(key) {
  const flow = flows[key]; if (!flow) return;
  showTyping();
  setTimeout(() => {
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot';
    if (flow.html) { b.innerHTML=flow.html; }
    else { b.style.whiteSpace='pre-line'; b.textContent=flow.text; }
    makeChoices(flow, b);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  }, 600);
}

function handleSend() {
  const text=input.value.trim(); if(!text) return;
  addUserMsg(text); input.value='';
  showTyping();
  setTimeout(() => {
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot'; b.style.whiteSpace='pre-line';
    b.textContent='ご質問ありがとうございます。\n担当者がナレッジを確認・更新いたします。\n\nお急ぎの場合は担当部署に直接お問い合わせください。';
    const choicesEl=document.createElement('div'); choicesEl.className='choices';
    const btn=document.createElement('button'); btn.className='choice-btn';
    btn.innerHTML='<span class="num back">←</span>最初に戻る';
    btn.addEventListener('click', ()=>{ addUserMsg('最初に戻る'); showFlow('start'); });
    choicesEl.appendChild(btn); b.appendChild(choicesEl);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  }, 800);
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} });
showFlow('start');
</script>
</body>
</html>
