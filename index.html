<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内ナレッジBot</title>
<meta name="theme-color" content="#1D9E75">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
#chat-wrap { display: flex; flex-direction: column; width: 100%; max-width: 680px; height: 90vh; max-height: 800px; background: #f5f5f0; border-radius: 16px; overflow: hidden; border: 0.5px solid #e0e0d8; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
#chat-header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; font-weight: 600; flex-shrink: 0; }
.bot-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.bot-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
.bot-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; }
#messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
.avatar.bot { background: #1D9E75; color: white; }
.avatar.user { background: #e8f0fe; color: #2a6fdb; }
.bubble { max-width: 82%; padding: 10px 14px; font-size: 14px; line-height: 1.75; color: #1a1a1a; }
.bubble.bot { background: #fff; border: 0.5px solid #e8e8e0; border-radius: 4px 16px 16px 16px; }
.bubble.user { background: #1D9E75; color: white; border-radius: 16px 4px 16px 16px; }
.manual-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #E1F5EE; border: 0.5px solid #5DCAA5; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 500; color: #0F6E56; text-decoration: none; transition: background 0.15s; }
.manual-link:hover { background: #9FE1CB; }
.canva-wrap { margin-top: 12px; border-radius: 8px; overflow: hidden; position: relative; width: 100%; height: 0; padding-top: 56.25%; box-shadow: 0 2px 8px rgba(63,69,81,0.16); }
.canva-wrap iframe { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; }
.canva-note { font-size: 12px; color: #888; margin-top: 6px; }
.choices { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
.choice-btn { background: #f8f8f4; border: 0.5px solid #ddddd5; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #1a1a1a; cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 8px; font-family: inherit; }
.choice-btn:hover { background: #eef8f4; border-color: #1D9E75; }
.choice-btn.free { border-style: dashed; color: #666; }
.choice-btn.free:hover { border-color: #1D9E75; color: #1a1a1a; }
.badge-wip { margin-left: auto; font-size: 10px; padding: 2px 7px; background: #fff8e6; color: #b07d00; border-radius: 99px; border: 0.5px solid #f0d080; white-space: nowrap; }
.num { width: 22px; height: 22px; border-radius: 50%; background: #E1F5EE; color: #0F6E56; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.num.back { background: #f0f0ec; color: #888; }
.num.free-icon { background: #f0f0ec; color: #888; font-size: 15px; }
.typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
#input-area { background: #fff; border-top: 0.5px solid #e0e0d8; padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
#user-input { flex: 1; border: 0.5px solid #ddddd5; border-radius: 20px; padding: 9px 16px; font-size: 14px; resize: none; min-height: 40px; max-height: 100px; color: #1a1a1a; background: #f8f8f4; font-family: inherit; outline: none; transition: border-color 0.15s; }
#user-input:focus { border-color: #1D9E75; }
#user-input::placeholder { color: #bbb; }
#send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
#send-btn:hover { background: #0F6E56; }
#send-btn svg { width: 17px; height: 17px; fill: white; }
@media (max-width: 480px) { body{padding:0;} #chat-wrap{height:100vh;max-height:100vh;border-radius:0;border:none;} }
</style>
</head>
<body>
<div id="chat-wrap">
  <div id="chat-header">
    <div class="bot-avatar">KB</div>
    <div>
      <div class="bot-name">社内ナレッジBot</div>
      <div class="bot-status">オンライン</div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="質問を直接入力..." rows="1"></textarea>
    <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
  </div>
</div>
<script>
const flows = {
  start: {
    text: "こんにちは！\n何について調べますか？",
    choices: [
      { label: '発送', next: 'dept_発送' },
      { label: '納品', next: 'dept_納品' },
      { label: 'バックオフィス', next: 'dept_バックオフィス' },
      { label: '棚卸し', next: 'dept_棚卸し' },

    ]
  },

    choices: [
      { label: '梱包作業前の作業', next: 'wip', wip: true },

    ]
  },

      { label: '値付け方法', next: 'wip', wip: true },
      { label: '発送方法', next: 'wip', wip: true },
      { label: '発送に戻る', next: 'dept_発送', back: true }
    ]
  },
  dept_納品: {
    text: '納品の何について知りたいですか？',
    choices: [
      { label: '納品作業', next: 'cat_納品_納品作業' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_納品_納品作業: {
    text: '納品作業の何について知りたいですか？',
    choices: [
      { label: '納品作業', next: 'wip', wip: true },
      { label: '納品後のパソコン作業', next: 'wip', wip: true },
      { label: '在庫管理シールの使い方', next: 'wip', wip: true },
      { label: '納品に戻る', next: 'dept_納品', back: true }
    ]
  },
  dept_バックオフィス: {
    text: 'バックオフィスの何について知りたいですか？',
    choices: [
      { label: '楽天設定', next: 'cat_バックオフィス_楽天設定' },
      { label: 'ヤフショ設定', next: 'cat_バックオフィス_ヤフショ設定' },
      { label: '楽天/ヤフショ共通', next: 'cat_バックオフィス_楽天_ヤフショ共通' },
      { label: '出品作業', next: 'cat_バックオフィス_出品作業' },
      { label: 'クロスモール', next: 'cat_バックオフィス_クロスモール' },
      { label: '価格の調整', next: 'cat_バックオフィス_価格の調整' },
      { label: 'その他', next: 'cat_バックオフィス_その他' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_バックオフィス_楽天設定: {
    text: '楽天設定の何について知りたいですか？',
    choices: [
      { label: 'ポイント変倍設定', next: 'item_ポイント変倍設定' },
      { label: 'キャッシュバックキャンペーン設定', next: 'item_キャッシュバックキャンペーン設定' },
      { label: 'クーポン設定', next: 'wip', wip: true },
      { label: 'LINE配信', next: 'item_LINE配信' },
      { label: 'バックオフィスに戻る', next: 'dept_バックオフィス', back: true }
    ]
  },
  item_ポイント変倍設定: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># 楽天ポイント変倍の設定\n\n## 目次\n\n1. ポイント変倍とは\n2. ポイント変倍の日を決める\n3. ポイント変倍2倍の設定\n4. 指定商品のポイント変倍2倍\n\n---\n\n## 01 ポイント変倍とは\n\nお客様が楽天とYahooの公式LINEを追加したときに当店では100円OFFのクーポンを配布しています。\n\n**毎月第4週の月曜日付近でクーポンの設定をするので、そのタイミングであいさつメッセージの設定をします。**\n\n---\n\n## 02 ポイント変倍の日を決める\n\nキャンペーンの表の丸が入ってる日を確認します。\n\n**丸が入ってる日全てにポイント変倍を設定します。**\n\n今回の場合は、1日、4〜10日、14〜18日、20日、24〜27日、30日となります。\n\n---\n\n## 03 ポイント変倍2倍の設定\n\nポイント変倍で○が入っているところの設定をします。\n\n- **日時が指定で入っているときはこれに従いこの時間のまま設定します**\n- **日時の指定が入っていないときは1日限定で設定します**\n\n### 設定手順\n\n1. 1日にワンダフルデーがあるのでこの日設定をします\n\n2. 楽天ヤフショ・キャンペーン・クーポン・ポイント設定へアクセス\n\n3. 店舗設定 → 店舗別ポイント変倍 → 独自のキャンペーンの作成\n\n4. 以下の項目を設定：\n   - **キャンペーン名**：カレンダー見て + キャンペーンの名前そのまま + 【2倍】\n   - **期間**：このキャンペーンは1日しかないので1日00:00:00から1日23:59:59になります\n   - **変倍率**：2倍\n\n5. **間違えていないか再確認し、申し込みする**\n\n---\n\n## 04 指定商品のポイント変倍2倍\n\n**アートクライムの商品のみ特別に全ての日にポイント変倍をかける指示が入っているので、設定します。**\n\n### 設定手順\n\n1. 店舗設定 → 商品管理 → 商品一覧・登録\n\n2. キーワード検索でアートクライムの商品管理番号「b012-105」を検索します\n\n3. 商品別ポイント変倍の設定：\n   - **ポイント変倍率**：2倍\n   - **期間**：一番早い時間〜次設定する日の一番早い時間\n\n4. **再確認し、更新する**</p>' + ml('https://www.canva.com/design/DAHDm-nWrtE/eRfp7UqE5-Iet4ES_qkNfQ/view', 'ポイント変倍設定マニュアルを開く') + canvaEmbed('https://www.canva.com/design/DAHDm-nWrtE/eRfp7UqE5-Iet4ES_qkNfQ/view?embed'); },
    choices: [
      { label: '楽天設定に戻る', next: 'cat_バックオフィス_楽天設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  item_キャッシュバックキャンペーン設定: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># 楽天ポイントキャッシュバックキャンペーン設定\n\n## 目次\n\n1. 楽天ポイントキャッシュバックキャンペーンとは\n2. バナーの設定準備\n3. RMSバナーの設定\n4. コンパスバナーの設定\n5. 商品名、オプションの設定\n6. 削除用ファイルの作成\n7. LINEの配信予約\n\n## 01 楽天ポイントキャッシュバックキャンペーンとは\n\n楽天CPとは、1日6万円支払って参加している楽天のキャンペーンです。\n\nこれに参加した店舗から購入したお客さんは最大100%の代金がポイントバックされます。（上限1万円）\n\n参加日は選択が可能なので大体マラソン中の5日0のつく日を選んで参加しています。\n\n今のところKKPL楽天市場のみ参加しています。\n\n## 02 バナーの設定準備\n\n1. KKPL楽天市場店のRMSを開きます\n2. 広告・アフィリエイト・楽天大学 → 広告（プロモーションメニュー）を開きます\n3. 楽天市場広告をクリックします\n4. バナー取得は**こちらから**で画像ダウンロードします\n5. **キャンペーンURLは別タブで開いてください**\n6. お買い物対象期間が今回のキャンペーンと同じ日になっているか確認します\n7. **エントリー期間が前日の00：00から始まっているのでできるだけ早く設定します**\n\n## 03 RMSバナーの設定\n\n1. KKPL楽天市場店のRMSのTOPを開きます\n   - 左上にRakuten RMSマークがあるのでクリックするとTOPに飛びます\n2. 店舗設定 → デザイン設定を開きます\n3. 店舗トップ・コンテンツ・商品・カテゴリページ共通 → 共通バナー設定を開きます\n\n### 大バナー設定\n\n**大バナー1：触らない**\n\n**大バナー2：**\n1. 画像URLを入れる\n2. リンク先URLを入れ替える\n3. 開始日時は前日の設定できる一番早い時間\n4. 終了日時は当日の23：59\n\n### 画像URL設定\n\n1. R-Cabinetをクリック\n2. バナー取得でダウンロードした画像をキャンペーンバナーのフォルダの中にドラッグ&ドロップで入れる\n3. 今回の画像を選んで選択をクリック\n   - **ここで入れる画像は1つ！（1080_210.jpg）**\n\n### リンク先URL設定\n\n1. バナー準備の時に別タブで開けておいたURLのリンクをコピーして貼り付けます\n2. **気をつけたいこと：前のCPで使ったリンクが入っているので全部消してから新しいリンクを入れる**\n3. **リンク先は絶対間違えないように**\n\n### 最終確認\n\n- 画像URLは正しく選べているか画像を確認\n- リンク先URLのリンクは前のが残ったままになっていないか確認\n- 掲載期間設定：開始日時と終了日時は正しく入っているか確認\n\n最後に登録するをクリックしてRMSのバナー設定は完了\n\n## 04 コンパスバナーの設定\n\nコンパスのバナー設定するところは2ヶ所\n\n### ①トップページの編集\n\n1. トップページの編集をクリック\n2. キャンペーン用の再編集をクリック\n3. 赤枠の中をクリックすると左の画像が出てきます\n4. 別タブで開いていたリンクを貼り付けます\n   - **気をつけたいこと：前のCPで使ったリンクが入っているので全部消してから新しいリンクを入れる**\n5. 画像変更をクリック\n6. 基本フォルダの中のキャンペーンバナーをクリック\n7. R-Cabinetに入れた画像が左上に来ているのでそれをクリック\n8. 今回のキャンペーンの日付に変える（これだと、0305キャンペーン用となる）\n9. 赤枠をクリックすると左側にタイトルテキストを入れるところが出てくるので日付変更して更新\n10. 左上の公開するをクリック\n11. 期間限定にチェックを入れて日付を間違えないように設定\n    - 開始日時は前日の設定できる一番早い時間\n    - 終了日時は当日の23：59\n\n### ②バナー設定\n\n1. +画像を追加するをクリックすると画像ファイルを登録すると出てくるのでカーソルを合わせてPC画像からえらぶをクリックし、CPの画像を選ぶ\n2. 画像をLINE登録の左横に移動します\n3. プレビューを確認をクリックするとそのままお待ちくださいの画面が表示されるので少しまち、右上にお店へ反映するがでたらクリック\n\n## 05 商品名、オプションの設定\n\n1. 店舗設定の商品管理をクリック\n2. CSV一括編集のCSVダウンロードをクリック\n3. ダウンロードする項目を選んでダウンロード（商品名にチェック）\n\n### サイバーダックからファイルをダウンロードする方法\n\n1. kkpliをクリック\n2. ritemをクリック\n3. downloadクリック\n4. 日付見て一番新しいファイルをWクリック\n\n### normal-item-titleのCSV作成\n\n1. SKU管理番号の列はいらないので列ごと削除\n2. 1行目にフィルターをかけて商品名の列を空白のみにする\n3. シートが空白のセルになったらA2とB2から一番下まで範囲選択して削除\n4. **【0/0限定★エントリーで2人に1人全額ポイントバック】**を商品名の頭に入れる\n   - **【】と商品名の前に半角空白入れる**\n\n### 気をつけたいこと\n\n- **新商品があれば編集した後に新商品の商品コードが入ってるか確認する**\n\n### CSVの保存方法\n\n1. 名前を**normal-item-title-○○**にする（○○はキャンペーンがある日付）\n2. 更新用と削除用のファイルを作って保存\n\n**POINT：**わかりやすいように楽天CPのファイルを作って、その中にCPの日のファイルを作って、その中に更新用と削除用を作ったら何かあった時に見返せるので保存しておきましょう。\n\n### グーグルドライブの保存方法\n\n1. マイドライブ → 楽天ポイントバックキャンペーンの順番にファイルを開く\n2. 過去のファイルが出てくるので新しく○月○日(20○○)の名前でファイルを作ります\n3. 日付ファイルの中に更新用と削除用を準備し、作ったCSVを入れます\n4. 今作ったファイルは更新する時に使うのCSVなので更新用ファイルに入れてください\n\n### normal-item-selectの作り方\n\n1. 今日から遡って一番近い日のファイルの更新用ファイルを開けたら、2つのファイルがあるのでnormal-item-selectのファイルを開けます\n2. このファイルに新規出品した商品コードを追加していきます\n3. 出品マスタがメニューバーのスプレッドシートの中に入ってるので開きます\n4. ✓が入っているところは楽天CPに登録できていて、□はCPまだ未登録の状態なので、未登録の商品コードを追加していきます\n\n**気をつけたいこと：**\n- **単品もバリエーションもこの形を間違えると正しくアップロードできないので、この形は絶対に崩さないようにしてください**\n\n5. 新規出品を追加できたらD列の商品オプション項目名が前回のキャンペーンの日付になっているので、置換で2/5になっているのを3/5に全部変える\n6. **日付を変えたら、前の日付が残っていないか⌘Fで調べてください**\n7. 名前をnormal-item-select-○○にする（○○はキャンペーンがある日付）\n8. 更新用ファイルに入れます\n\n## 06 削除用ファイルの作成\n\n### ★更新用ファイルを作るタイミングで削除用ファイル（item-delete-option）を作る理由\n\n商品は日々どんどん追加されていきます。\nこのCPは毎回同じ人が作業するとは限らないので、誰が見てもわかる必要があります。\n\n**更新用ファイルを作るタイミングで削除用ファイルを作らなかったら起こる問題**\n- どこからが新規出品かわからなくなる\n\n**更新用ファイルを作るタイミングで削除用ファイル（normal-item-title）を作らない理由**\nCPの期間中に商品名を変えたのに、CP前にファイルを作ってたら商品名変更前のが上がってしまいます。なので削除用のタイトルはCPが終わってから作成します。\n\n### item-delete-option作成\n\n1. 削除用を開くと2つのファイルが出てくるので、item-delete-optionを開きます\n2. A列の商品管理番号に単品出品は商品コード、バリエーション商品は親コードを追加します\n3. B列の選択肢タイプはSのみ\n4. C列の商品オプション項目名の日付が前のままになっているので置換で今回の日付に変える\n5. **日付を変えたら、前の日付が残っていないか⌘Fで調べてください**\n\n### item-delete-option保存\n\n1. item-delete-option-○○にする（○○はキャンペーンがある日付）\n2. 保存先：\n   - 自分の削除用のファイルに入れる\n   - グーグルドライブの削除用ファイルにいれる\n\n### item-select-title作成（CP終了後）\n\n1. RMSからCSVをダウンロードしたら商品名の前にキャンペーンの文言と空白が入ってるので置換で削除します\n2. ⌘FでCPの内容が全部消えているか確認します\n3. item-select-title-○○と名前をつけて2ヶ所に保存\n\n## 07 LINE配信予約\n\n### ログイン方法\n\n1. 楽天のLINEはビジネスアカウントでログインします\n2. 店舗名をクリックします\n\n### 画像選択\n\n1. リッチメッセージをクリックすると過去に配信したLINEが出てきます\n2. 日付が一番新しいCPの…をクリックしてコピーします\n3. アイテム名の日付のみ変える\n4. 画像の変更をクリック\n5. 画像をそのまま適用するをクリック\n6. 1040_1040.jpgをドラッグ&ドロップで入れる\n7. 違うタブで開いていたリンクを入れる\n\n### LINEの作り方\n\n1. メッセージリストをクリック\n2. 配信済みをクリック\n3. …をクリックしてコピーする\n\n### キャンペーンの見方\n\nキャンペーンカレンダーを確認し、例えば5日は：\n- スーパーセール\n- 0と5のつく日\n\n2つのイベントが被っているのでLINEにもその旨を入れます\n\n**例：**\n```\n本日は見逃せないお得な1日\n3つのキャンペーン同時開催！\n楽天スーパーセール\nポイントキャッシュバックキャンペーン\n0と5のつく日（ポイント最大4倍）\nさらに…\n画像をタップしてエントリーすると\n最大10,000ポイントプレゼント！\nお買い物前のエントリーをお忘れなく！\n今だけのチャンスです\n```\n\n### LINEの文章の作り方\n\n配信日時はCP当日の18：03\n\n**なぜこの時間？**\n他の公式LINEが18時にしているところが多いので紛れないようにするため少し時間をずらしてます\n\nテキストを入れたらプレビューで見れるので：\n- イベントが全部入っている\n- 改行や絵文字を入れて見やすく\n- なるべく簡潔かつ魅力的に\n- 1番頭にお得感が伝わる内容を持ってくる\n\n### LINEの画像の設定方法\n\n1. リッチメッセージを選択をクリック\n2. 楽天CPの1番上にある画像がリッチメッセージで作った画像なので、選択をクリック\n\n**POINT：**\nプレビューで画像があってるか、リンク先があっているか再度確認してください。\nプレビューの画像をクリックしたらリンク先確認できます。\n\n3. 最後に配信予約クリック</p>' + ml('https://www.canva.com/design/DAHCSHIjk9M/fQQDy9H-LjUixImG11bDfg/view', 'キャッシュバックキャンペーン設定マニュアルを開く') + canvaEmbed('https://www.canva.com/design/DAHCSHIjk9M/fQQDy9H-LjUixImG11bDfg/view?embed'); },

  item_LINE配信: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># ヤフショ LINE配信の設定方法\n\n## 目次\n\n1. LINE配信とは\n2. LINE配信の日を決める\n3. LINE配信の文章を決める\n4. LINE配信の設定\n\n## 01 LINE配信とは\n\nLINEの配信は大型セールの時や当店負担でキャンペーンに参加する際に売上を最大化するために行う施作です。\n\nヤフーショッピングに紐もづけているKKPLヤフーショップ用のLINEからお客様に向けて配信の予約を行います。\n\n## 02 LINE配信の日を決める\n\n### 前提条件\n\n2026年2月現在、ヤフショのLINEの登録者数は1787人です。\n\nライトプランでは月間に5000通までLINEを配信することが可能です。\n5000件をオーバーした場合、5000件に達するまでお客様に配信して**5000件を超えた分は配信されません**。\n\n今の登録者数でいうと3回配信したら5000通に達します。\n（1787*3=5361 361人には配信されません）\n\n**この場合は月に3回まで配信します。\n（つまり5000通に達する回数まで配信します）**\n\n### LINE配信の日を考えるコツ\n\n配信する日の優先順位：\n\n1. **大型セールかつボーナスストアに参加している日**\n   - ボーナスストアはストア負担で全品5%OFFしているのと同じことなので、できるだけこの日に集客をしたいというのが前提です。\n\n2. **ボーナスストアに参加している日かつポイント還元率が最大の日**\n\n3. **イベント日で1番ポイント還元率が高い日**\n\n**※ただし2日連続で配信しても効果は薄い**\n\n### 大型セールの種類と優先順位\n\n1. **超PayPay祭り** （楽天でいうとスーパーセール）\n   - 最大還元率が突出していてCMも流れる\n   - モール＋ストア施策が重なる年数回だけの"本命イベント"\n\n2. **ブラックフライデー、年末年始セール** （楽天でいうとブラックフライデー）\n   - 年に1回だけ。ポイント倍率強化、クーポン重複多め\n\n3. **爆買いWEEK** （楽天でいうとお買い物マラソン）\n   - 年に4〜6回程度、超PayPay祭ほどの大型ではない\n   - 季節の切り替わり前後に実施されやすい\n\n4. **5のつく日・プレミアムな日曜** （楽天でいうと0と5のつく日）\n   - 毎月5の付く日や日曜日に開催される\n   - 定番になっているのでお客様も覚えていて、特に集客しなくても人は集まる\n\n### 配信日の決定手順\n\n1. イベントカレンダーシートの設定したい月を開く\n2. カレンダーを確認して候補日を選定\n3. 超PayPay祭りは2日候補がありますが**初日にLINEを配信します**\n\n理由は以下の通りです：\n- **初速でSEOを上げるため**\n- **LINEの配信時間は18：03分にしています。その日に開封されるとは限らないので最終日に設定すると気が付かずにイベントが終わる可能性があります**\n\n4. 結果決まった配信日をカレンダーに○を入力します\n\n## 03 LINE配信の文章を決める\n\n### LINEの配信内容\n\n開催中のイベント、ボーナスストア参加の有無を赤四角の部分から確認した上で文章を考えてください。chatGPTを使用するのもおすすめです！\n\n**あなただけのタイムセールは一度商品ページを訪れたお客様にだけ配信されるのでLINEの配信としては不適切なので入れる必要はありません**\n\n### 配信文章のポイント\n\n以下のポイントはしっかり押さえた上で、個性を出してください！\n\n- **1番頭にお得感が伝わる内容を持ってくる**\n  - 読み進めてもらうために開催中のキャンペーンやポイント還元率などをTOPに\n\n- **なるべく簡潔かつ魅力的に**\n  - 長いとそもそも読んでもらえません。できるだけ文字を削ることにこだわって\n  - どれだけ長くても超PayPay祭りの例ぐらい\n\n- **読みやすいように改行を入れる**\n\n- **その日の開催イベントは全て記載する（文章のTOPに）**\n\n- **その日の最大ポイント還元率は必ず記載する（文章のTOPに）**\n\n- **2点以上購入で200円OFFクーポンを同時に配信するのでそれの訴求も行う**\n\n### 配信例\n\n**ボーナスストア＋5％対象日**\n\nボーナスストアとは、\n対象ストアでの購入で\nポイント還元が上乗せされる仕組みです。\n\n本日は＋5％還元\n【最大〇〇％ポイント還元】\n\n2点以上購入で200円OFFクーポンも併用OK！\nいつもよりお得なタイミングです\n\n## 04 LINE配信の設定\n\n### リッチメッセージの作成\n\n1. 公式LINEにログインします\n   - **ヤフショと楽天でログイン方法が異なるので注意**\n   - Yahoo! JAPAN IDをクリック\n   - ログイン情報を入れてログインする\n   - 店舗名をクリック\n\n2. リッチメッセージを作成\n   - リッチメッセージをクリック\n   - 作成をクリック\n\n3. アイテム名を以下のように設定\n   ```\n   2個以上購入で200円OFF（○○○○年○○月）\n   ```\n\n4. 画像のアップロード\n   - 画像セクションの選択をクリック\n   - 画像をそのまま適用するをクリックして画像をアップロード\n\n5. アクションの設定\n   - リンクを選択\n   - URL欄を埋める\n\n6. クーポンURLの取得\n   - ストアクリエイターを開く\n   - 集客・販促 → クーポン → クーポン設定をクリック\n   - ⌘F（コマンドF）で「2点以上購入で200円OFFクーポン」を検索\n   - 公開日時と終了日時を確認して、LINEを配信する月に1ヶ月間通してかかっているクーポンを探す\n   - そのクーポンのURLをクリックして、URLを全てコピー\n\n7. 設定完了\n   - コピーしたURLをリッチメニュー設定画面のURL欄に貼り付け\n   - アクションラベル欄には「リンクに移動」と入力\n   - 保存をクリック\n\n### メッセージの配信予約\n\n1. メッセージを作成をクリック\n2. 配信日時をカレンダーを見ながら設定\n\n**LINEの配信時間は18：03に設定します**\n- 多くの公式LINEが18：00などキリのいい時間に配信を行うため、他の通知で埋もれてしまう可能性があります\n- そのためあえて少しずらして配信しています\n\n3. 配信設定\n   - **LINE VOOMに投稿のチェックはデフォルトでついてしまうので、必ず手動で外してください**\n\n4. テキスト入力\n   - テキスト欄にはその日のイベントに合わせて考えた内容の文章を貼り付け\n   - **配信日によってイベントや倍率が異なるので、必ず配信日ごとに文章を考える必要があります**\n   - **右側にプレビューが表示されるので改行などを入れる際の参考にしてください**\n\n5. リッチメッセージの追加\n   - 追加ボタンを押して先ほど作成したリッチメッセージを付け加える\n   - 右のマークをクリック → リッチメッセージを選択をクリック\n   - 先ほど作成したリッチメッセージを選択\n\n6. 配信予約\n   - 配信予約をクリックして1日分の予約完了\n   - これを配信する日数分設定\n\n7. 最終確認\n   - **LINE上の配信予約日とカレンダーの○の位置が正しいかを確認**\n   - 完了チェックにチェックを入れて、上長に報告して完了</p>'; },
    choices: [
      { label: '楽天設定に戻る', next: 'cat_バックオフィス_楽天設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },

  item_ボーナスストア: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># ボーナスストアへの参加と設定方法\n\n## 目次\n\n1. ボーナスストアの一覧を確認\n2. ボーナスストアの参加予定を考える\n3. ボーナスストアに参加する\n4. ボーナスストア直前の準備(オプションの追加)\n5. ボーナスストア終了後の作業(オプションの削除)\n\n## ボーナスストアとは\n\n対象ストアで購入すると、通常よりも多くポイントが還元される仕組みです（Yahoo!ショッピングのポイント上乗せプログラム）\n\n### 還元率の種類\n- **+5%と+10%の2種類あります**\n  - 通常1% + ボーナス5% → 合計6%相当(実質5%OFFと同じ)\n  - 通常1% + ボーナス10% → 合計11%相当(実質10%OFFと同じ)\n\n### 参加について\n- **参加型のイベントのため、こちらが参加日を選んで参加する必要があります**\n- **お客様に還元されるポイント分(5%)の負担は全てこちら負担です**\n- **10%の方は割引率が大きすぎるため弊社は5%の方にだけ参加しています**\n\n---\n\n## 01 ボーナスストアの一覧を確認\n\n1. 参加キャンペーン一覧ページを開く\n2. **ボーナスストアPlus 5%** を右の窓から探す\n3. **開催日を見る** をクリック\n\n**注意：ボーナスストPlus10%もあるので要注意。10%には参加しない**\n\n---\n\n## 02 ボーナスストアの参加予定を考える\n\n### イベントカレンダーの確認\n\n1. イベントカレンダーを開く\n2. 緑四角と青四角の部分を確認\n\n### 各マークの意味\n- **緑四角**：ボーナスストアの5%ポイントはストア負担だが、緑四角部分のポイント付与(最大5%)はヤフショ負担\n- **青四角**：全てのキャンペーンに参加、条件をクリアした場合の最大ポイント付与率が合計された数値\n\n### キャンペーン選択の考え方\n\n1. **ボーナスストア参加店舗のポイント還元率がUPする日を狙う**\n2. **大型セール時は企業もメールや広告、CMなどでPRしているため、お客様がモールに集まる。したがって大型セール時にキャンペーンに参加することで参加効率を最大化する**\n\n**上記の2点を総合的に考えて、参加する日を選択する**\n\n### 優先順位について\n- **大型セールとボーナスストア参加で5倍(合計10倍)どちらに参加するか迷った場合、大型セールを優先してください**\n- **理由は大型セールは「1番お客様が集まる」からです**\n- **※もし大型セールの中でも複数のキャンペーンが混じっている場合は必ず上長に相談してください**\n\n---\n\n## 03 ボーナスストアに参加する\n\n1. 参加するキャンペーンの右側**申し込みボタン**を押す\n2. チェックを入れて申し込みボタンを押す\n3. **最後に参加した日とカレンダーの◯の位置が正しいかを確認した上で完了チェックにチェックを入れて、上長に報告して完了**\n\n---\n\n## 04 ボーナスストア直前の準備(オプションの追加)\n\n### 作業の目的\n- **ボーナスストアの恩恵(5%還元)をお客様が受けるためには購入前にキャンペーンへのエントリーが必要**\n- エントリーを忘れたまま受注が入ると問い合わせが発生するため、事前に防ぐのが目的\n- この作業により、お客様がカートに入れるボタンを押した際に選択肢が表示される\n\n### 注意事項\n**これまではCSVダウンロード項目の選択画面で必要なファイルをダウンロードしていました。この作業をなくすために現在は"全自動"で取得しています。そのためCSVダウンロード項目の選択は触らないように注意をお願いします。チェック項目を変更すると自動取得のプログラムに問題が出ます**\n\n#### 設定のタイミング\n- **文言追加の作業：基本はボーナスストア参加日の前日**\n  - 例：日曜日にボーナスストアに参加している場合は金曜日に設定\n- **文言削除の作業：基本はボーナスストア参加日の翌日に削除**\n  - 例：土曜日にボーナスストアに参加している場合は月曜日に削除\n\n### オプション追加手順\n\n1. イベントカレンダーシートを開く\n2. 『ボーナスストアoption追加』シートを開く\n3. 上部のメニューバーの**"スクリプト処理"**をクリック\n4. **【ボーナスストア】option文言設定**をクリック\n5. **文言を追加**をクリック\n6. **CSVを開く(Drive)**ボタンをクリック\n7. ドライブに遷移するので、ダウンロードボタンを押してCSVファイルをダウンロード\n\n### ストアクリエイターproでのアップロード\n\n1. 商品登録→商品管理をクリック\n2. **アップロードタイプは一切触らないでください**（**"項目指定"がデフォルトで、そのままでOK**）\n3. ファイルを選択ボタンを押す\n4. 先ほどダウンロードした以下のファイルを選択：\n   - **ヤフショoption追加_◯◯◯◯◯◯◯◯.csv**\n   - **（追加になっていることを確認）**\n5. アップロードボタンを押す\n6. 最後に読込ボタンを押して完了\n7. **最後にBOチームのチャットワークグループで設定が完了した旨を上長に報告**\n\n---\n\n## 05 ボーナスストア直前の準備（バナー設定PC/SP）\n\nストアショップにPC用とSP用のバナー設置を行います。\n\n---\n\n## 06 ボーナスストア終了後の作業(オプションの削除)\n\n### 手順（オプション文言追加の際とほとんど同じ）\n\n1. 上部のメニューバーの**"スクリプト処理"**をクリック\n2. **【ボーナスストア】option文言設定**をクリック\n3. **文言を削除**をクリック\n4. **CSVを開く(Drive)**ボタンをクリック\n5. ドライブに遷移するので、ダウンロードボタンを押してCSVファイルをダウンロード\n\n### ストアクリエイターproでのアップロード\n\n1. 商品登録→商品管理をクリック\n2. **アップロードタイプは一切触らないでください**（**項目指定がデフォルトで、そのままでOK**）\n3. ファイルを選択ボタンを押す\n4. 先ほどダウンロードした以下のファイルを選択：\n   - **ヤフショoption削除_◯◯◯◯◯◯◯◯.csv**\n   - **（削除になっていることを確認）**\n5. アップロードボタンを押す\n6. 最後に読込ボタンを押してオプションの削除設定は完了\n7. **最後にBOチームのチャットワークグループで設定が完了した旨を上長に報告**</p>'; },
    choices: [

  item_LINE配信: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># ヤフショ LINE配信の設定方法\n\n## 目次\n\n1. LINE配信とは\n2. LINE配信の日を決める\n3. LINE配信の文章を決める\n4. LINE配信の設定\n\n## 01 LINE配信とは\n\nLINEの配信は大型セールの時や当店負担でキャンペーンに参加する際に売上を最大化するために行う施作です。\n\nヤフーショッピングに紐もづけているKKPLヤフーショップ用のLINEからお客様に向けて配信の予約を行います。\n\n## 02 LINE配信の日を決める\n\n### 前提条件\n\n2026年2月現在、ヤフショのLINEの登録者数は1787人です。\n\nライトプランでは月間に5000通までLINEを配信することが可能です。\n5000件をオーバーした場合、5000件に達するまでお客様に配信して**5000件を超えた分は配信されません**。\n\n今の登録者数でいうと3回配信したら5000通に達します。\n（1787*3=5361 361人には配信されません）\n\n**この場合は月に3回まで配信します。\n（つまり5000通に達する回数まで配信します）**\n\n### LINE配信の日を考えるコツ\n\n配信する日の優先順位：\n\n1. **大型セールかつボーナスストアに参加している日**\n   - ボーナスストアはストア負担で全品5%OFFしているのと同じことなので、できるだけこの日に集客をしたいというのが前提です。\n\n2. **ボーナスストアに参加している日かつポイント還元率が最大の日**\n\n3. **イベント日で1番ポイント還元率が高い日**\n\n**※ただし2日連続で配信しても効果は薄い**\n\n### 大型セールの種類と優先順位\n\n1. **超PayPay祭り** （楽天でいうとスーパーセール）\n   - 最大還元率が突出していてCMも流れる\n   - モール＋ストア施策が重なる年数回だけの"本命イベント"\n\n2. **ブラックフライデー、年末年始セール** （楽天でいうとブラックフライデー）\n   - 年に1回だけ。ポイント倍率強化、クーポン重複多め\n\n3. **爆買いWEEK** （楽天でいうとお買い物マラソン）\n   - 年に4〜6回程度、超PayPay祭ほどの大型ではない\n   - 季節の切り替わり前後に実施されやすい\n\n4. **5のつく日・プレミアムな日曜** （楽天でいうと0と5のつく日）\n   - 毎月5の付く日や日曜日に開催される\n   - 定番になっているのでお客様も覚えていて、特に集客しなくても人は集まる\n\n### 配信日の決定手順\n\n1. イベントカレンダーシートの設定したい月を開く\n2. カレンダーを確認して候補日を選定\n3. 超PayPay祭りは2日候補がありますが**初日にLINEを配信します**\n\n理由は以下の通りです：\n- **初速でSEOを上げるため**\n- **LINEの配信時間は18：03分にしています。その日に開封されるとは限らないので最終日に設定すると気が付かずにイベントが終わる可能性があります**\n\n4. 結果決まった配信日をカレンダーに○を入力します\n\n## 03 LINE配信の文章を決める\n\n### LINEの配信内容\n\n開催中のイベント、ボーナスストア参加の有無を赤四角の部分から確認した上で文章を考えてください。chatGPTを使用するのもおすすめです！\n\n**あなただけのタイムセールは一度商品ページを訪れたお客様にだけ配信されるのでLINEの配信としては不適切なので入れる必要はありません**\n\n### 配信文章のポイント\n\n以下のポイントはしっかり押さえた上で、個性を出してください！\n\n- **1番頭にお得感が伝わる内容を持ってくる**\n  - 読み進めてもらうために開催中のキャンペーンやポイント還元率などをTOPに\n\n- **なるべく簡潔かつ魅力的に**\n  - 長いとそもそも読んでもらえません。できるだけ文字を削ることにこだわって\n  - どれだけ長くても超PayPay祭りの例ぐらい\n\n- **読みやすいように改行を入れる**\n\n- **その日の開催イベントは全て記載する（文章のTOPに）**\n\n- **その日の最大ポイント還元率は必ず記載する（文章のTOPに）**\n\n- **2点以上購入で200円OFFクーポンを同時に配信するのでそれの訴求も行う**\n\n### 配信例\n\n**ボーナスストア＋5％対象日**\n\nボーナスストアとは、\n対象ストアでの購入で\nポイント還元が上乗せされる仕組みです。\n\n本日は＋5％還元\n【最大〇〇％ポイント還元】\n\n2点以上購入で200円OFFクーポンも併用OK！\nいつもよりお得なタイミングです\n\n## 04 LINE配信の設定\n\n### リッチメッセージの作成\n\n1. 公式LINEにログインします\n   - **ヤフショと楽天でログイン方法が異なるので注意**\n   - Yahoo! JAPAN IDをクリック\n   - ログイン情報を入れてログインする\n   - 店舗名をクリック\n\n2. リッチメッセージを作成\n   - リッチメッセージをクリック\n   - 作成をクリック\n\n3. アイテム名を以下のように設定\n   ```\n   2個以上購入で200円OFF（○○○○年○○月）\n   ```\n\n4. 画像のアップロード\n   - 画像セクションの選択をクリック\n   - 画像をそのまま適用するをクリックして画像をアップロード\n\n5. アクションの設定\n   - リンクを選択\n   - URL欄を埋める\n\n6. クーポンURLの取得\n   - ストアクリエイターを開く\n   - 集客・販促 → クーポン → クーポン設定をクリック\n   - ⌘F（コマンドF）で「2点以上購入で200円OFFクーポン」を検索\n   - 公開日時と終了日時を確認して、LINEを配信する月に1ヶ月間通してかかっているクーポンを探す\n   - そのクーポンのURLをクリックして、URLを全てコピー\n\n7. 設定完了\n   - コピーしたURLをリッチメニュー設定画面のURL欄に貼り付け\n   - アクションラベル欄には「リンクに移動」と入力\n   - 保存をクリック\n\n### メッセージの配信予約\n\n1. メッセージを作成をクリック\n2. 配信日時をカレンダーを見ながら設定\n\n**LINEの配信時間は18：03に設定します**\n- 多くの公式LINEが18：00などキリのいい時間に配信を行うため、他の通知で埋もれてしまう可能性があります\n- そのためあえて少しずらして配信しています\n\n3. 配信設定\n   - **LINE VOOMに投稿のチェックはデフォルトでついてしまうので、必ず手動で外してください**\n\n4. テキスト入力\n   - テキスト欄にはその日のイベントに合わせて考えた内容の文章を貼り付け\n   - **配信日によってイベントや倍率が異なるので、必ず配信日ごとに文章を考える必要があります**\n   - **右側にプレビューが表示されるので改行などを入れる際の参考にしてください**\n\n5. リッチメッセージの追加\n   - 追加ボタンを押して先ほど作成したリッチメッセージを付け加える\n   - 右のマークをクリック → リッチメッセージを選択をクリック\n   - 先ほど作成したリッチメッセージを選択\n\n6. 配信予約\n   - 配信予約をクリックして1日分の予約完了\n   - これを配信する日数分設定\n\n7. 最終確認\n   - **LINE上の配信予約日とカレンダーの○の位置が正しいかを確認**\n   - 完了チェックにチェックを入れて、上長に報告して完了</p>'; },
    choices: [
      { label: 'ヤフショ設定に戻る', next: 'cat_バックオフィス_ヤフショ設定', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  item_クーポン: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># ヤフショ クーポンの設定方法\n\n## 目次\n\n1. [クーポンとは](#1-クーポンとは)\n2. [一括定期クーポンの設定方法](#2-一括定期クーポンの設定方法)\n3. [店舗クーポンの新規作成方法](#3-店舗クーポンの新規作成方法)\n4. [既存の店舗クーポンの複製方法](#4-既存の店舗クーポンの複製方法)\n\n## 1. クーポンとは\n\nヤフショのクーポンには3種類あります：\n\n### ①店舗が詳細な設定をして発行するクーポン\n### ②一括定期クーポン\n元々設定されている日や、特定の条件のお客様に対して自動で発行されるクーポン（設定するのは割引率や利用可能回数ぐらい）\n\n### ③インテリジェントクーポン\nAIが「クーポンがあれば購入する可能性が高いユーザー」を自動で判別し最適なタイミングでクーポンを配信する\n\n**弊社が使用しているのは①と②のクーポンだけ**\n\n## 2. 一括定期クーポンの設定方法\n\n### 一括定期クーポンとは\n画像のように特定の日や会員ランクによって発行されるクーポンです。\n\n### 設定手順\n1. 変更のボタンを押す\n2. 設定したい月を押すだけで設定は完了\n\n## 3. 店舗クーポンの新規作成方法\n\n### 店舗クーポンとは\nこのマニュアルでは主に①店舗が詳細な設定をして発行するクーポンの設定方法を説明します。\n\n**一括定期クーポンでは補いきれない商品のクーポンを発行することが目的です**\n\n#### 例\n- **2個以上購入で200円OFF**\n- **商品指定の割引クーポン**\n\n**※メーカーによって**\n『ブランドの価値を守るために定価販売を厳守してください。その代わりクーポンやポイントの付与は自由です』というスタンスの商品があります。\n**この決まりを破ると商品を卸してもらえなくなるので遵守しています**\n\n### 新規作成手順\n\n#### ①店舗が詳細な設定をして発行するクーポンの発行方法\n1. ストアクリエイタープロの集客・販促 → クーポン → クーポン設定をクリックします\n\n#### ②イベントカレンダーシートの確認\n1. **イベントカレンダーシート**の設定したい月を開く\n2. ここに入力されている内容が1行1クーポンの意味になっています\n\n- **設定不要** → 前月までかけていたクーポンがもうその商品を取り扱わないなどの理由で不要になった場合\n- **赤文字** → 新しく追加になった、もしくは値段が変更になった場合\n\n#### 赤文字で追加・変更を行う対象\n- **出品マスタの備考欄にクーポン設定が必要な旨が書いてある商品を出品した担当者**\n- **クーポンの値段の変更指示などがあった場合**\n\n**作業のフロー上赤文字にしておかないと、そのクーポンの新規発行、クーポンの値段変更、商品の追加が『誰も気が付かず漏れ続ける』ことになります。**\n\n#### ③新規でクーポンを発行する場合\n1. **新規発行**をクリックします\n\n#### ④クーポン名とクーポンの説明文\n**クーポン名やクーポンの説明文はお客様にも表示されます。以下のルールに沿って設定をお願いします**\n\n- **クーポン名**: 商品指定クーポン(〇〇〇〇円OFF)何度でも使用可能\n- **クーポンの説明文**: 特定の商品で何度でも使用できるクーポンです。\n\n#### ⑤クーポンのカテゴリと値引き設定\n- **クーポンのカテゴリ**: **全商品共通でその他を選択**\n- **値引き**: **基本的に定額値引きしか使用しません。スプレッドシートに記載されている割引率を設定してください**\n\n#### ⑥公開期間の設定\n- **公開期間の上限**: 最大90日間\n- **開始日**: 当日以降で設定可能\n\n**新商品などで月の途中で設定する場合**（例えば2月14日に設定する場合）\n**2月15日（翌日）〜2月末（2/28）までを公開範囲に設定します**\n\n**この設定+イベントカレンダーシートに赤文字で追加することで翌月以降のフローに乗ってきます**\n\n#### ⑦公開範囲の設定\n**必ず"表示"を選択します**\n**非表示の場合は設定をしてもクーポンがお客様に表示されません**\n\n#### ⑧クーポン画像とリンク先URLの設定\n\n##### クーポン画像ファイル名\nファイル名は以下の構成になっています：\n- **例**: coupon_2300.jpg\n- **(coupon_〇〇〇.jpg ○の部分は割引率100円OFFなら100)**\n\n**2026年2月現在で以下のクーポン画像は設定ずみなので割引率に合わせてファイル名に数字を入れるだけでOKです。**\n**新規にアップロードが必要な場合はマニュアルの通りのルールでクーポン画像の名前を設定してください。（他の人も使用できるように）**\n\n利用可能な割引額：\n- 50円、100円、150円、200円、300円、400円、500円、600円、700円、800円、900円、1000円\n- 1100円、1200円、1300円、1400円、1500円、1600円、1700円、1800円、1900円、2000円\n- 2100円、2200円、2300円、2400円、2500円、2600円、2700円、2800円、2900円、3000円\n\n##### リンク先URL\n**全てのクーポンに関して以下の商品一覧のURLに設定してください**\n```\nhttps://store.shopping.yahoo.co.jp/phatee/search.html?p=#CentSrchFilter1\n```\n\n#### ⑨対象商品の設定\n1. **クーポン適用商品**のラジオボタンをクリックして窓を出します\n2. 設定する商品の商品管理番号を入力する\n\n**バリエーションのある商品に設定する場合も親商品管理番号は使わず、各商品ページの商品管理番号を入力する**\n\n例：\n- para001-029\n- a001-029\n\n3. **最後に1番下までスクロールして確認ボタンを押し完了です！**\n\n#### ⑩完了チェック\n1. **最後にカレンダーシートの設定したクーポンの完了チェック欄にチェックをいれて全ての設定が完了したら**\n2. **ダブルチェックをした後に上長に報告をお願いします。**\n\n## 4. 既存の店舗クーポンの複製方法\n\n### 複製手順\n\n#### ①クーポン設定画面へ移動\n1. ストアクリエイタープロの集客・販促 → クーポン → クーポン設定をクリックします\n\n#### ②対象クーポンの検索\n1. **イベントカレンダーシート**の設定したい月を開く\n2. クーポン名をコピーして\n3. ストアクリエイタープロのクーポン一覧画面で\n4. **⌘F（コマンドF）で検索をかける**\n\n#### ③複製実行\n1. **一致するクーポンの右にあるコピーボタンをクリックする**\n\n#### ④公開範囲の設定\n**次月の1日から月末までを設定する。**\n**例えば2月に翌月分を設定する場合、公開範囲は3月1日〜3月31日まで**\n\n**1日も漏れないように卓上カレンダーなどを見ながら設定してください**\n\n#### ⑤対象商品の設定\n**スプレッドシート上で対象商品が赤文字になっている場合だけ触る**（対象商品を追加する必要がある場合のみ）\n\n**複製だけをする場合はこの項目は触らないでください**\n\n- 商品管理番号を追加する際には **,（半角のカンマ）で区切って入力する**\n- **1番下までスクロールして確認をクリックして完了です**\n\n#### ⑥完了チェック\n1. **最後にカレンダーシートの設定したクーポンの完了チェック欄にチェックをいれて全ての設定が完了したら**\n2. **ダブルチェックをした後に上長に報告をお願いします。**</p>'; },
    choices: [

  item_あなただけのタイムセール: {
    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># あなただけのタイムセール設定方法\n\n## 目次\n\n1. [あなただけのタイムセールとは](#1-あなただけのタイムセールとは)\n2. [あなただけのタイムセールに参加する日を考える](#2-あなただけのタイムセールに参加する日を考える)\n3. [あなただけのタイムセールの設定方法](#3-あなただけのタイムセールの設定方法)\n\n## 1. あなただけのタイムセールとは\n\nあなただけのタイムセールとは、**購買意欲の高いお客様限定で24時間セールを実施できる機能**です。\n\nあらかじめタイムセールの開催日・対象商品・割引率を設定しておくことで、ヤフショ独自のロジックによって抽出されたお客様のトップページや通知画面にタイムセールの特別オファーが表示されます。\n\n既に商品に興味があり購入を検討しているお客様に限定してセールを実施するため、すべてのお客様を対象とした通常のセールよりも高い購買効果が期待できます。\n\n**弊社では特定の日に5%の割引を設定しています**\n\n## 2. あなただけのタイムセールに参加する日を考える\n\n### イベントカレンダーシートの確認\n\n1. イベントカレンダーシートの設定したい月を開く\n2. あなただけのタイムセールの行を設定していく\n\n### イベントカレンダーの見方\n\n- **プロモーションパッケージ参加店舗の場合**：\n  - 全ストア対象のキャンペーンに加えて、各日付に入っている%分が"ヤフショ負担"でお客様にポイント還元\n  - ボーナスストアに参加する日のみ関連\n  - 優良店舗の場合：合計2+3の合計5%がお客様に還元\n\n### タイムセールに参加する日を考えるコツ\n\n**前提として、お客様が"集まる""購入したい"日はポイント還元が高い日**\n→イベント時に合わせて設定する\n\n#### ①ボーナスストアに参加する日は必ず参加する\n\n- ボーナスストアは5%店舗負担でポイント還元するので利益率が5%下がる\n- 弊社が目標としている利益率は15%\n- その日にタイムセールを打つと利益率がさらに下がるので**利益率が25%以上の商品だけに絞ってタイムセール**を設定\n- **使用するマークは△**\n\n#### ②通常のイベント時にも参加する\n\n以下のイベントに合わせて利益率15%以上の商品だけ設定：\n- プレミアムな日曜日\n- ゾロ目の日\n- ヤフショ感謝デー\n- 爆買いウィークなど\n\n- **使用するマークは◯**\n\n### カレンダーへのマーク付け手順\n\n1. **ボーナスストア参加日全てに△のマークを入れる**\n2. **通常イベント時（3以上の数字が入っている日）に◯のマークを入れる**\n   - すでに△が入っている場合は不要\n   - 必ず△を優先\n\n## 3. あなだけのタイムセールの設定方法\n\n### 基本設定\n\n1. ストアクリエイターを開く\n2. 集客・販促 → あなただけのタイムセール を開く\n3. 設定したい月をクリックして「新規作成」をクリック\n\n### △の日（ボーナスストア参加日）の設定\n\n#### 日付と管理名称の設定\n\n1. カレンダーで△の日付を選択してクリック\n2. 管理名称を設定：\n   ```\n   利益率25%以上のみ(○○月分)\n   ```\n\n#### 対象商品の設定\n\n1. スプレッドシートの『タイムセール設定商品一覧』シートを開く\n2. スクリプト処理 → あなただけのタイムセール情報取得 ボタンを押す\n3. 「商品マスタの取得が完了しました」ポップアップが表示されるまで待つ\n4. OKボタンを押す\n5. **青枠（△=利益率25%以上）の商品管理番号をセルごとコピー**\n6. 対象商品1の「対象商品コード（最大1,000商品）を指定」のラジオボタンをクリック\n7. コピーした商品管理番号を入力欄に貼り付け\n\n#### 割引率と登録\n\n1. **定率割引を5%で設定**\n2. 下までスクロールしてチェックボックスにチェックを入れる\n3. 「登録」ボタンを押す\n\n### ◯の日（通常イベント時）の設定\n\n**◯の日付の設定も全く同じ手順です。違う点は以下の3点のみ：**\n\n1. **最初の日付の設定を◯の日に合わせる**\n2. **管理名称を以下にする**：\n   ```\n   利益率15%以上のみ(○○月分)\n   ```\n3. **◯の商品管理番号（赤枠）をコピーする**\n\n### 完了報告\n\n1. ◯と△どちらも設定が完了したら、カレンダーシートの完了チェック欄にチェックを入れる\n2. 上長に報告\n\n## 重要な注意事項\n\n- **設定をテレコにしてしまうと大幅に損をする可能性があるので、必ずダブルチェックを実施**\n- **商品はリアルタイムで自動更新されるのでコピーするだけでOK**\n- **割引率は必ず5%で設定**\n- **ボーナスストア参加日は利益率25%以上、通常イベント時は利益率15%以上の商品のみ対象**</p>'; },

    get html() { return '<p style="white-space:pre-line;margin-bottom:10px;"># LINEお友達追加クーポン 楽天・Yahoo\n\n## 目次\n\n1. LINEあいさつメッセージとは\n2. 楽天のLINE追加クーポン\n3. Yahoo!のLINE追加クーポン\n\n## 01 LINEあいさつメッセージとは\n\nお客様が楽天とYahooの公式LINEを追加したときに当店では100円OFFのクーポンを配布しています。\n\n**毎月第4週の月曜日付近でクーポンの設定をするので、そのタイミングであいさつメッセージの設定をします。**\n\n## 02 楽天のLINE追加クーポン\n\n### ログイン方法\n\n1. **楽天のLINEはビジネスアカウントでログインします**\n2. 店舗名をクリックします\n\n### 設定手順\n\n1. トークルーム管理 → あいさつメッセージをクリック\n   - **LINEの文章はこのままでURLだけ変えます**\n\n2. 店舗設定 → クーポン設定\n3. クーポン情報設定\n4. **クーポン(配布型)をクリック**\n\n### クーポン検索\n\n1. いろんなクーポンが出てくるので、検索窓で**LINE**と検索する\n2. LINEで検索すると何個かクーポンが出てくるので、**ステータスが期間中になっているもの（日付が一番新しいもの）**のクーポンを見つけて、コピーします\n\n**日付が新しいクーポンを選ぶ理由**\n- 画像が変わってたり、内容が変わることがあるかもしれないので、最新の情報を間違えないようにお客様にお伝えするため\n\n### クーポン設定\n\n1. **クーポンの有効期限のみ変更します**\n   - 今日の日付の最短時間から来月末の23時59分まで\n\n2. 一番下までスクロールすると、規約が出てくるので、✓を入れて**登録する**をクリック\n\n3. 今作ったクーポンのURLをコピーしてLINEのトーク画面に貼り付けます\n\n### 最終確認\n\n1. **LINEのプレビュー画面で有効期限とクーポンの内容があっているか確認します**\n2. **変更を保存してBOチャットに報告**\n\n### 完了報告\n\n楽天ヤフショ・キャンペーン・クーポン・ポイント設定スプレッドシートの**LINEお友達登録者限定100円OFFクーポンの欄の完了に✓を入れたら作業終了です。**\n\n## 03 Yahoo!のLINE追加クーポン\n\n### ログイン方法\n\n1. **Yahoo!Japan IDでログインします**\n2. ショップ名クリック\n\n### 設定手順\n\n1. トークルーム管理 → あいさつメッセージをクリック\n   - **LINEの文章はこのままでURLだけ変えます**\n\n2. 集客・販促 → クーポン → クーポン設定\n3. **クーポン名にLINE限定クーポンを入れて検索**\n\n### クーポン選択\n\n1. **一番新しい公開開始日時を見つけて右のコピー**\n\n**POINT**\n**LINE限定クーポンは50円OFFと100円OFFの2つがあるので間違えないように設定しましょう**\n\n### 期間設定\n\n1. **公開期間を最短日時から翌月末に設定する**\n\n### URL取得\n\n1. 今作ったクーポンのURLをクリックすると、URLが出てくるのでそれをコピーします\n\n### 最終確認\n\n1. **LINEのプレビュー画面で有効期限とクーポンの内容があっているか確認します**\n2. **変更を保存してBOチャットに報告**\n\n### 完了報告\n\n楽天ヤフショ・キャンペーン・クーポン・ポイント設定スプレッドシートの**LINE限定クーポンの欄の一番右に✓を入れたら作業終了です。**</p>'; },

  dept_棚卸し: {
    text: '棚卸しの何について知りたいですか？',
    choices: [
      { label: '棚卸し前の準備', next: 'cat_棚卸し_棚卸し前の準備' },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },
  cat_棚卸し_棚卸し前の準備: {
    text: '棚卸し前の準備の何について知りたいですか？',
    choices: [
      { label: '棚卸しに戻る', next: 'dept_棚卸し', back: true }
    ]
  },
  wip: { text: 'このナレッジは現在準備中です。\n担当部署に直接ご確認ください。', choices: [{ label: '最初に戻る', next: 'start', back: true }] },
  free_input: { text: 'どんなことでも自由に入力してください。', choices: [{ label: '最初に戻る', next: 'start', back: true }] }
};

const LSVG = '<svg width="14" height="14" viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zm-1 3H5a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-8h-2v8H5V8h8V6z"/></svg>';
const ml = (url, label) => '<a class="manual-link" href="' + url + '" target="_blank">' + LSVG + label + '</a>';
const canvaEmbed = (src) => src ? '<div class="canva-wrap"><iframe loading="lazy" src="' + src + '" allowfullscreen allow="fullscreen"></iframe></div><p class="canva-note">スライドをスクロールして該当ページをご確認ください</p>' : '';

const messagesEl = document.getElementById('messages');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const scrollBottom = () => messagesEl.scrollTop = messagesEl.scrollHeight;

function showTyping() {
  const row=document.createElement('div'); row.className='msg-row bot'; row.id='typing-row';
  const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
  const b=document.createElement('div'); b.className='bubble bot';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}
function removeTyping() { const t=document.getElementById('typing-row'); if(t) t.remove(); }

function addUserMsg(text) {
  const row=document.createElement('div'); row.className='msg-row user';
  const av=document.createElement('div'); av.className='avatar user'; av.textContent='あ';
  const b=document.createElement('div'); b.className='bubble user'; b.style.whiteSpace='pre-line'; b.textContent=text;
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}

function makeChoices(flow, b) {
  if (!flow.choices || !flow.choices.length) return;
  const choicesEl=document.createElement('div'); choicesEl.className='choices';
  flow.choices.forEach((c,i) => {
    const btn=document.createElement('button');
    if (c.wip) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+(i+1)+'</span>'+c.label+'<span class="badge-wip">準備中</span>';
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow('wip'); });
    } else if (c.free) {
      btn.className='choice-btn free';
      btn.innerHTML='<span class="num free-icon">✎</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow('free_input'); setTimeout(()=>input.focus(),700); });
    } else if (c.back) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num back">←</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow(c.next); });
    } else {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+(i+1)+'</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow(c.next); });
    }
    choicesEl.appendChild(btn);
  });
  b.appendChild(choicesEl);
}

function showFlow(key) {
  const flow=flows[key]; if(!flow) return;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot';
    if(flow.html){ b.innerHTML=flow.html; }
    else{ b.style.whiteSpace='pre-line'; b.textContent=flow.text; }
    makeChoices(flow,b);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  },600);
}

const GAS_PROXY = 'https://script.google.com/macros/s/AKfycbxMuSgsGyN2eCZqYqzEGiCwGaR-6XwUFLl7xeD2fUqeBj1Na9vbdZzrjFbhcVm7hieK/exec';
let conversationId = '';

async function handleSend() {
  const text=input.value.trim(); if(!text) return;
  addUserMsg(text); input.value='';
  showTyping();
  try {
    const res = await fetch(GAS_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ query: text, conversation_id: conversationId })
    });
    const data = await res.json();
    conversationId = data.conversation_id || '';
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot'; b.style.whiteSpace='pre-line';
    b.textContent = data.answer || 'エラーが発生しました。';
    const choicesEl=document.createElement('div'); choicesEl.className='choices';
    const btn=document.createElement('button'); btn.className='choice-btn';
    btn.innerHTML='<span class="num back">←</span>最初に戻る';
    btn.addEventListener('click',()=>{ addUserMsg('最初に戻る'); showFlow('start'); });
    choicesEl.appendChild(btn); b.appendChild(choicesEl);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  } catch(err) {
    removeTyping();
    console.error(err);
  }
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} });
showFlow('start');
</script>
</body>
