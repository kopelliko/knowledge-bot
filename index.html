<style>
body { margin: 0; font-family: sans-serif; background: #f5f7fa; }

#chat-wrap { max-width: 720px; margin: 0 auto; background: #fff; height: 100vh; display: flex; flex-direction: column; }

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: #ffffff;
  border-bottom: 1px solid #f1f5f9;

}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: #1D9E75;
  color: #fff;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-text .title { font-size: 16px; font-weight: 600; }

.header-text .subtitle { font-size: 12px; color: #6b7280; }

.header-right {

  align-items: center;

}

.status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

}

.choice-btn {

#input-area {

}

#user-input {
  flex: 1;
  border: 1px solid #dbe3ea;
  border-radius: 18px;
  padding: 11px 16px;
}

#send-btn {
  width: 44px;
  height: 44px;
  background: #1D9E75;
  border-radius: 12px;
}

.manual-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  background: #f6fffb;
  border: 1px solid #cfeee2;
  border-radius: 12px;
  padding: 9px 13px;
  font-size: 13px;
  font-weight: 600;
  color: #0f6e56;
  text-decoration: none;
}

.canva-wrap {
  margin-top: 14px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  width: 100%;
  height: 0;
  padding-top: 56.25%;
  border: 1px solid #e5e7eb;
  background: #f8fafc;
}

.canva-wrap iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  border: none;
}

.canva-note {
  font-size: 12px;
  color: #6b7280;
  margin-top: 8px;
}

.msg-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.msg-row.user {
  justify-content: flex-end;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.avatar.bot {
  background: #1D9E75;
  color: white;
}

.avatar.user {
  background: #d1d5db;
}

</style>

    itemName: '梱包作業前の作業',
    text: '### 前提\n弊社では午前発送と午後発送の二部で分かれています。「午前発送分」という説明が多く出てきますが、午後発送時も同様の処理を行い、その際には■午後発送分フェーズを使ってください。\n\n### 前日分の確認\n1. 注文処理→注文処理フェーズを開く\n2. ⚫︎午前発送分 ◼午後発送分の以下を確認する\n   - ★追跡番号反映待ち\n   - ★自社発送完了(楽天ヤフショ)\n   - ★自社発送完了(Amazon)\n3. **再送・キャンセル以外のものがあれば社員に確認**\n4. 再送・キャンセルのものは完了に移動させる\n\n#### 残件数の移動手順\n1. 残っている件数をクリック\n2. 下にスクロールし、該当件数をクリック\n3. 「注文一括処理」をクリック\n4. 管理番号をクリックして別ウィンドウを開く\n5. 一言メモ（備考）で再送・キャンセルを確認\n6. 処理フェーズを完了に移動→更新をクリック\n\n### 当日分のフェーズ移動\n1. 注文処理→注文一括処理を開く\n2. 処理フェーズ：注文確認→検索\n3. **件数が100を超えていたら最大件数を全部表示できる数に増やす（例：350件なら500件表示）**\n4. ☑チェックを入れる→一括処理\n5. 処理フェーズ：●午前発送分 / 発送日：今日（☑全て上書き）→処理開始\n\n### 住所警告の確認\n1. 処理フェーズ：●午前発送分→検索\n2. ⚠️住警マークを確認する\n3. 管理番号をクリックして住所を確認\n\n#### 住所の修正方法\n- 注文者情報住所(左枠)と届け先住所(右枠)が違う場合→届け先住所をメモに控える\n- どちらの場合も**右側の届け先住所のみを修正する**\n- 矢印をクリック→郵便番号の住所が表示される→番地等を加えて「更新」\n- **最初の住所に「字」等が入っていた場合は最初の住所を優先する**\n\n#### 郵便番号が間違っている場合\n1. Googleで「〇〇市××町 郵便番号」で検索\n2. 正しい郵便番号をクロスモールに入力→再度自動で住所を表示\n3. 番地など足りない部分を付け足して更新\n4. リストから⚠️マークが消えたらOK\n\n#### 住所確認メールの送信（届かないと思われる住所）\n1. 該当者にチェックを入れて「一括処理」\n2. メール分類を「その他」→「メール送信」をクリック\n3. 定型文：【重要】送付先住所〜→「メール送信を開始」をクリック\n4. 処理フェーズを「★自社出荷に時間かかる」に変更→処理開始\n5. **返事が来るまで発送しない（カスタマーサポート担当が対応するので発送担当は何もしない）**\n\n### ピッキングリストの印刷\n1. 処理フェーズ：●午前発送分 / 配送便：ネコポス→検索\n2. **100件を超える場合は最大件数を1000にする**\n3. ネコポスの件数をメモする\n4. 全件にチェック→一括処理→「ピッキング」をクリック→ダウンロード\n5. 右上のPDFをクリック→印刷マーク→IR-C3322を選択→印刷\n6. **ゆうパック(元払い)・ゆうパケット(パフ)・ヤマト(発払い)も同様に繰り返す**\n\n### 注文データの取得\n1. SmoothECフォルダの「SmoothEC変換用」シートを開く\n2. 「貼り付け用」シートを開く\n3. 前日データ削除\n4. 注文自動取得\n5. 転記されたら「編集用貼り付け」\n6. 「SmoothECフォーマット」シートを開く\n7. クロスモールの件数が一致しているか確認\n8. CSVダウンロード\n\n### 注文データの取込\n1. SmoothECにログイン（メニューバーのSmoothECフォルダ→「Global GO！」）\n2. 注文登録→CSV登録\n3. CSVファイルを選択→先ほどダウンロードしたファイルを選択\n4. アップロード\n5. **⚠️ここで注文総件数を確認（エラーが出たら「エラー内容出力」をダウンロードして確認）**\n6. 登録\n\n### JANコードエラーの対処\n**エラーの主な原因：JANコード未登録**\n\n#### スプレッドシートでのJAN変更\n1. 「SmoothEC変換用」の「JAN変更シート」を開く\n2. JAN変更シート クリア（前回分）\n3. JAN変更\n4. 該当の6桁の注文番号を入力\n5. JAN変更したい商品を選択→OK\n6. 正しいJANを入力→OK\n7. JAN変更シートCSVダウンロード\n8. 再度SmoothECに登録（アップロード）\n\n#### 翌日以降に同じエラーが出ないための処理（クロスモールのJAN変更）\n1. 「注文構成品一覧」を開く\n2. CSVツール→JAN編集→注文構成品一覧クリア→注文構成品一覧取得\n3. 対象となる注文があるクロスモールのフェーズを選択\n4. ⌘F（Ctrl+F）で管理番号を検索\n5. 同じ行のC列（構成品コード）をコピー\n6. クロスモール→出品処理→商品一括処理\n7. 日付をクリア→商品コード欄に貼り付け→検索\n8. 完全一致している商品コード(標準)を開く\n9. SKU編集→JANコード設定\n10. **正しいJANコードを入力（バリエーションがある場合はF列またはH列を確認）**\n11. 登録',

    itemName: '梱包作業前の作業',
    text: '### 梱包作業の流れ\n1. 注文登録後、受注件数に発送件数が表示されるので「ピッキングリスト印刷」を押す（実際には印刷されない）\n2. 件数が移るので梱包待ちの「梱包作業」を押す\n3. 自動で配送便ごとに分かれるので担当する発送方法を押す\n4. ゆうパックは「ゆうパック」/ゆうパケットパフは「ゆうパケット」/ネコポスは「ネコポス」を選択\n5. 該当する商品のJANをかざし、伝票が印刷される→次の注文へ繰り返す\n\n### 注意事項\n- **⚠️合せ買いで配送便を変えた際は、梱包が終わったら必ず元の配送便に戻す**（送料が高い配送便で出し続けてしまうため）\n- **⚠️「出荷済み」のボタンは梱包作業が終わるまで押さない**（1度押すと総件数しか分からなくなるため）\n\n### 文字コードエラーの対処\n- 主な原因：「旧字」を使用している場合\n- 「送り先情報編集」をクリック\n- 思い当たる文字を「新字」に変更する\n- **⚠️クロスモールやモールでの変更は不要**\n\n### 一時的にフェーズ移動させる方法（欠品・在庫を後で探す場合）\n1. 注文番号を控える\n2. ダッシュボード→該当する配送便の「一覧」を選択\n3. 控えた注文番号で検索\n4. ➕ボタンで内容を確認→「取消」すると受注件数に戻る\n5. ダッシュボードに戻って受注件数の一覧を押す\n6. 該当注文に☑を入れて「削除」ボタンを押す\n\n### 午後発送\n- 処理フェーズは「◾️午後発送分」を使用する\n- 01梱包作業前〜02梱包作業の作業を再度行う\n- **⚠️土日祝は午後の注文処理前に朝と同様のモールキャンセル処理を行う**',
    choices: [
      { label: '梱包作業前の作業に戻る', next: 'item_梱包作業前の作業', back: true },
      { label: '発送業務に戻る', next: 'cat_発送_発送業務', back: true },
      { label: '最初に戻る', next: 'start', back: true }
    ]
  },

    canvaUrl: 'https://www.canva.com/design/DAHBuv0mMzk/TYRsbIawvvq7J01lQPwyEg/view',
    embedUrl: 'https://www.canva.com/design/DAHBuv0mMzk/TYRsbIawvvq7J01lQPwyEg/view?embed',
    itemName: '梱包作業前の作業',
    text: '### 件数確認とフェーズ移動\n1. 梱包作業終了後「ダッシュボード」→「出荷待ち」をタップ\n2. ゆうパック・ゆうパケット・ネコポス・ヤマト(発払い)の件数を確認\n3. 梱包が完全に終わったら日本郵便とヤマト運輸の「出荷済み」を押す\n\n### WEB EDIデータのダウンロード\n**WEB EDIとは：スムースECで発行した伝票の情報（発送件数・注文番号・問い合わせ番号）を各配送会社に伝えるもの**\n\n#### ヤマトのWEB EDIデータ\n1. 「ダッシュボード」の「出荷登録待ち」をタップ\n2. 「ヤマト出荷データ」を選択→当日分データを全てダウンロード（**必ず日時を確かめる**）\n\n#### ゆうパケットパフのWEB EDIデータ\n1. 「ダッシュボード」の「出荷待ち」をタップ\n2. 「郵便局出荷データ」を選択→当日分データを全てダウンロード（**必ず日時を確かめる**）\n\n### ゆうパケットパフ WEB EDI変換\n1. SmoothECフォルダの「WEB EDI用変換」スプレッドシートを開く\n2. WEB EDI用ファイル生成→「CSVアップロード→ゆうパケットCSV生成」\n3. ファイル選択→ダウンロードした「郵便局出荷データ」を選択\n4. アップロードして生成\n5. ゆうパケットパフの総件数が合っているか確認\n6. CSVをダウンロード\n\n### WEB EDIアップロード\n\n#### ゆうパケットパフ\n1. ブックマークの「ゆうパケットパフWEB-EDI」を開く→ログイン\n2. ♦ファイル転送業務→送信一覧→送信\n3. ファイル選択→ダウンロードしたファイルをアップロード\n\n#### ヤマト\n1. ブックマークの「ヤマトビジネスメンバーズ」を開く→ログイン\n2. EDIツール\n3. 「出荷予定データ取込み」の「利用する」\n4. **⚠️ファイル形式：新EDI(CSV)を選択**\n5. 「ヤマト出荷データ」を選択→取込み\n6. **⚠️発送した件数に間違いないか確認**\n\n### クロスモールへの追跡番号反映\n\n#### 出荷データダウンロード\n1. 出荷データダウンロードを押す→はい\n2. **⚠️ここでダウンロードすると変更ができなくなるので注意**\n\n#### クロスモールでの処理\n1. 午前分・午後分を全て「★追跡番号反映待ち」に移動させる\n2. 注文伝票CSV連携→〈列名パターン〉SmoothEC用\n3. ファイルを選択→ダウンロードした「出荷データ」を選択\n4. 更新対象：★追跡番号反映待ち\n5. ☑取込完了後にメールを送信する / メール分類：出荷済み / 定型文：出荷済みメール(追跡番号あり)\n6. アップロード\n\n### 全体の確認\n1. 処理フェーズ：★追跡番号反映待ち / 店舗：空欄→検索\n2. 以下が全て埋まっているか確認：**配送番号・発送日・出荷済みメールのマーク**\n3. **配送番号か発送日が空欄→モール側に追跡番号が反映されず出荷遅延になる**\n4. **メールマークがない→お客様に発送メールが届かずクレームが増える**\n\n### 各サイト個別対応\n\n#### メルカリSHOPS\n1. 処理フェーズ：★追跡番号反映待ち / 店舗：メルカリShops店→検索\n2. 全件にチェック→「注文連携CSV」をクリック→ダウンロード\n3. メルカリShopsサイト→注文→CSV一括機能→「一括発送通知」\n4. 「orders_〜」ファイルを選択→アップロード→「発送通知を送る」\n5. クロスモールに戻り一括処理→処理フェーズを完了→処理開始\n\n#### Qoo10\n1. 処理フェーズ：★追跡番号反映待ち / 店舗：Qoo10店→検索\n2. 全件にチェック→「注文連携CSV」→ダウンロード\n3. 「order_csv_〜」ファイルをExcelで開く\n4. **A列を選択→標準の横の▼→数値を選択（文字化けが直る）/ C列も同様**\n5. ファイル→名前を付けて保存→Excelブック(.xlsx)に変更して保存\n6. Qoo10サイト→配送要請→「発送処理(一括発送)」→「カート番号でExcel一括発送」\n7. 「Excel Upload」→作ったファイルを選択→Upload File→一括発送処理\n8. クロスモールに戻り処理フェーズを完了→処理開始→一括処理\n\n#### 楽天・ヤフショ\n1. 処理フェーズ：★追跡番号反映待ち / 店舗：KKPL楽天市場→検索\n2. 全件にチェック→一括処理→処理フェーズを★自社発送完了（楽天ヤフショ）→処理開始\n3. 店舗をAllife楽天市場店・KKPLヤフーショップに変更し同様作業\n4. **★自社発送完了（楽天ヤフショ）に入れることで不備がなければ自動で「完了」に移動する**\n\n#### Amazon\n1. 処理フェーズ：★追跡番号反映待ち / 店舗：amazon店→検索\n2. 全件にチェック→一括処理→処理フェーズを★自社発送完了（Amazon）→処理開始\n\n#### 最終確認\n- 処理フェーズ：★追跡番号反映待ち / 店舗：空欄→検索\n- **何も表示されなければOK（残っている注文があれば社員に確認）**\n- **ダウンロードフォルダの中身を全てゴミ箱に捨てて完了！**',

    itemName: '出品方法',
    text: '### 写真と値段と商品説明は使い回してOK <!-- page:4 -->\n\n検索して該当があった場合（過去に出品したことあり）\n- 商品名（A列）\n- 販売価格（B列）  \n- 商品説明（D列）\n\n### 写真の取得方法 <!-- page:5-6 -->\n\n過去にうちがラクマに出品した際の画像を取得していきます。\n\n1. **スタッフさんシートのE列にURLがあればそこをクリック**\n2. **↓のように訳ありなどで撮り直し指示がある場合はすでにあるリンクをクリック**\n3. **リンクがない場合P15〜P17を参考にして撮影し直す**\n\n#### 画像ダウンロード手順\n1. 商品ページが開くので画像をクリックして以下の画像の状態にします\n2. **上から順番にダブルクリックで画像がダウンロードフォルダにダウンロードされます**\n3. 撮り直し指示がある場合は使いまわせる画像だけダウンロードして、そのほかの画像が必要な場合改めて撮影します（方法はP15~P17参照）',

    canvaUrl: 'https://www.canva.com/design/DAFdsTQ5kow/1R1klicDmm0mql3NDv6bbg/view',
    embedUrl: 'https://www.canva.com/design/DAFdsTQ5kow/1R1klicDmm0mql3NDv6bbg/view?embed',
    itemName: '出品方法',
    text: '### 出品開始 <!-- page:7 -->\n右下の「出品」をクリック\n\n### 商品画像の設定 <!-- page:8 -->\n「画像を選択する」に最初に撮影もしくはダウンロードした写真をドラッグ＆ドロップする\n（アップしたあとで順番の入れ替えも可能）\n\n### 商品名の設定 <!-- page:9 -->\nラクマ出品シートのA列\n\n### カテゴリ・ブランドの設定 <!-- page:10 -->\n- **カテゴリーを選ぶ**（そんなに厳密に考えなくてもだいたいで大丈夫。ただ何に使うものか全く検討がつかない時などは同じ商品を出品してる他の人のページを見ると参考になる）\n- **ブランドは空欄でOK**\n\n### 商品説明 <!-- page:11 -->\nラクマ出品シートのA列\n\n### 商品の状態 <!-- page:12 -->\n- **やや傷や汚れありから上のコンディションを状態に合わせて選択する**\n- 数回使用した程度のものが多いため、**基本的に製品に不良がない場合は【未使用に近い】を選択する**\n\n### その他の設定 <!-- page:13 -->\n- **配送料の負担：送料込み（出品者が負担）**\n- **配送方法：未定**\n- **発送日の目安：支払い後2-3日で発送**\n- **発送元の地域：兵庫県**\n- **購入申請：なし**\n- **販売価格：ラクマ出品シートB列**\n- ↓「確認する」\n\n### 完了 <!-- page:14 -->\n1. 商品を「ラクマ出品済み」の棚に置いて完了です！\n2. **E列が「訳あり」や空欄になっていたらP37を参考にして商品ページのURLをE列に上書きしてください**',

  item_出品方法_s4: {
    page: '15-34',
    canvaUrl: 'https://www.canva.com/design/DAFdsTQ5kow/1R1klicDmm0mql3NDv6bbg/view',
    embedUrl: 'https://www.canva.com/design/DAFdsTQ5kow/1R1klicDmm0mql3NDv6bbg/view?embed',
    itemName: '出品方法',
    text: '過去に出品した事があるものと比較して以下の手順が増えます。\n- 写真の撮影\n- 商品名の設定\n- 商品説明の設定\n- 出品価格の設定\n\n### 写真の撮影 <!-- page:16-18 -->\n\n自分のスマホで商品の写真を撮る\n以下の構成でお願いします。\n\n1. **商品パッケージの写真**（商品が大きく写るように）\n2. **全ての付属品とパッケージが並んだ写真**\n3. **商品本体の前面と背面の写真**\n\n#### 撮影の際の注意 <!-- page:17 -->\n- **※レビューシールや楽天に納品する際のバーコードシール等が貼ってある場合は写真を撮る前に剥がしておく**\n- きれいに剥がれない場合はドライヤーを当てながらはがすとはがしやすいです\n- **※同じ商品が複数あるものは毎回撮影する必要はありません。ラクマの出品履歴から商品画像を取得してください（P5からの手順です）**\n\n#### チャットワークで写真を送る <!-- page:18 -->\n1. **「マイチャット」を使い写真をアップロード**\n2. **PCに画像が同期されるのでダウンロード**（このファイル名をクリック）\n\n### 商品名の設定方法 <!-- page:19-23 -->\n\n#### 楽天管理画面からの商品名取得 <!-- page:19-21 -->\n1. https://item.rms.rakuten.co.jp/rms-item/shops/390078/items にアクセスしてログイン\n2. **店舗設定をクリック→商品管理をクリック**\n3. **ブランド名などでキーワード検索**\n4. **検索ボタンを押す**\n5. **該当の商品の名前をクリック**\n6. **楽天でのうちの販売ページが表示されるので、商品名を全てコピー→ラクマの商品名の部分に貼り付け**\n\n#### 商品名の編集 <!-- page:22-23 -->\n1. **ラクマは40文字までしか商品名を設定できないので不要な部分を削除**\n2. **保証の文言、キャンペーン、即日発送等削除。**\n3. **頭から順番に重要なキーワードなので、今回の場合以下の赤文字を削除していく**\n4. **ブランド名の日本語がある場合は優先して残す**\n5. **完成した商品名をスタッフシートのラクマシートのA列に入力**\n\n### 商品の説明 <!-- page:24-26 -->\n\n#### 説明文の作成 <!-- page:24 -->\n楽天の商品名からキャンペーン、保証、即日発送等の不要な文言を消したもの＋以下の定型文を商品ページに記載。\n\n**定型文：**\n- 外箱だけ開封しました。または 数回だけ使用しました。のどちらかを商品に合わせて入れる\n- 恐れ入りますがお値下げの交渉にはお返事できません。\n- 在庫はありますので即購入可能です。m(_ _)m\n\n**※オーラルケア用品など未使用じゃないとおかしいものは「数回だけ使用しました」の部分を「新品未使用です。外箱だけ開封しました」など商品や状態に応じて適宜変更してください**\n\n#### 完成した商品説明をスタッフシートの【ラクマ】シートのD列に入力 <!-- page:26 -->\n\n### 出品価格を決める <!-- page:27-33 -->\n\nでの出品価格は以下の様に決めます\n**楽天の新品の販売価格の75%の価格**\n\n#### 楽天の価格調査 <!-- page:28-31 -->\n1. **楽天の管理画面(RMS)にログインします**\n2. **※パスワードが不明な場合はスタッフさん用のパスワードシートを確認してください**\n3. **店舗設定→商品管理をクリックします**\n4. **商品一覧・登録をクリックします**\n5. **この画面で弊社が楽天で扱っている全商品が確認できます**\n6. **商品のパッケージからブランド名っぽい文言を探して、楽天の検索窓に入力します**\n\n#### 価格計算例 <!-- page:31 -->\n- **在庫数の欄（青い四角の部分）に⌄の記号がある場合はバリエーションがある商品です**\n- **⌄のボタンを押すと緑の四角の部分が表示されます**\n- **2980円の75%は2980×0.75=2235**\n- **1の位は切り捨てで2230円が今回の出品価格になります**\n\n**万が一楽天での出品が見つからない場合は声をかけてください。** <!-- page:32 -->\n\n#### 出品価格をスタッフシートの【ラクマ】シートのB列に入力 <!-- page:33 -->\n\n### ここまでで写真,商品名,販売価格が揃ったのでP7から出品作業を進める <!-- page:34 -->\n\n### URLの記録 <!-- page:35 -->\n1. **出品が終わったら「出品した商品を見る」をクリック**\n2. **でてきたページのURLをスタッフさんシートのE列にコピペする**\n3. **※忘れていた場合はアカウント名→出品した商品からも出品ページのURLが見られます**\n4. **初めて出品したものが傷があるなど訳あり品の場合写真を次回に使えない画像もあるので「訳あり」の旨とリンクを書く**',

    itemName: '出品方法',
    text: '過去に出品した事があるものと比較して以下の手順が増えます。\n- 写真の撮影（見た目の訳ありの場合はその箇所も写真を撮る）\n- 商品名の頭に番号をつける\n- 商品詳細に不良の内容を書く\n- 出品価格の設定\n\n**※ここでは便宜上特に問題のない商品を「訳なし」と呼びます**\n\n### 写真の撮影 <!-- page:37 -->\nP24に加えて不良箇所の写真を撮ります。\n**※（電源が付かないないなど、見た目以外の不良は特に撮影する箇所はありません。）**\n**箱に破れ、凹み、商品本体に傷などがある場合はその箇所を撮影**\n\n### 商品名の頭に番号をつける <!-- page:38-39 -->\n1. **商品名をつける際に頭に出品した日付を記入**（売れた際にどの訳ありが売れたのかわかるように）\n2. **例：9月10日に出品した場合 →商品名の頭に0910と半角スペースを入れる**\n3. **日付の数字を書いた付箋を貼っておく**\n4. **はがれないように上からマステを貼ってください**\n\n### 商品詳細に不良の内容を書く <!-- page:40-41 -->\n1. **ラクマの商品の説明欄に不良の内容を自分で追記します**\n2. **何か不良がある場合、シートの価格や自分が設定した価格よりも100円下げて販売する**\n3. **1800円で販売する商品の場合、訳がある商品は1700円で設定**\n\n### 写真,販売価格,商品名が揃ったのでP7から出品作業を進める <!-- page:42 -->',

    embedUrl: 'https://www.canva.com/design/DAG477t53NQ/HPLqjOsutkpEmtj2cWZrDw/view?embed',
    itemName: '納品作業',
    text: '### 商品ラベルの貼り方\n\n#### 基本ルール\n- **ラベルシールは、必ず商品のバーコードを必ず隠す形で貼り付けます**\n- このシールに店舗の情報やどの商品ページに出品されるかの情報が入っています\n- **他のバーコードをAmazon倉庫で読み込まないように1商品1バーコード（商品ラベルだけが見える）の状態にします**\n\n#### パッケージがない商品\nパッケージがない商品は袋に入れるというルールがあります。\n\n**方法：**\n1. 袋に入れる前にバーコードを隠し、袋の上から商品ラベルを貼る\n2. タグのバーコード面を内側に入れた状態で袋に入れ、セロテープで固定し、袋の上から商品ラベルを貼る\n\n**どちらか早い方で作業していただければOKです。**\n\n#### セット商品\n- セット品は袋に入れる、もしくはラップで複数の商品を1つにします\n- **その際にバーコードが内側に重なるようにセットすると、バーコードを隠す必要がなく、商品ラベルを貼るだけで納品できるので効率的です**\n- 袋に入れるのかラップなのかはシートのAmazon備考に記載されています\n- 形状的にどうしてもバーコードを内側にセットできない場合は無地のシールでバーコードを隠します\n\n#### シールが貼れない小さい商品\n- 商品ラベルが貼れない小さな商品の場合はジップロックか袋に入れて納品します\n- 商品がジップロックの中で動く範囲を考えた時に、**バーコード全面が外に見えない程度なら隠す必要はありません**\n- 効率的に作業するために小さめのジップロックを使えばOKです\n\n#### 液体、粒、粉が入っている商品\n液体や粉が入っている商品は袋に入れて納品するルールがあります。\n\n**方法：**\n1. 商品のバーコードを隠してから袋に入れ、袋の上から商品ラベルを貼る\n2. 袋に入れてからバーコードを隠す形で商品ラベルを貼る\n\n**どちらか早い方でOKです。**\n\n#### 筒状の商品の場合\n**筒状の商品の場合、商品ラベルを横向きに貼るとバーコードリーダーで読み込めない可能性があるので縦向きに貼る必要があります。**\n\n### 段ボールへの配送ラベルの貼り方 <!-- page:24 -->\n\n- 各納品倉庫毎に異なる配送ラベルを貼り付けます\n- **1ダンボールにつき配送ラベル1個と宅配業者の配送伝票（現在は西濃運輸）1個を貼り付けます**\n- 商品ラベルと同様に、段ボールにバーコードが書いている場合は全てのバーコードをマジックで黒塗りします\n- **梱包後に段ボールの全面を確認してください**',

    text: '1. 店舗設定の商品管理をクリック\n2. CSV一括編集のCSVダウンロードをクリック\n3. ダウンロードする項目を選んでダウンロード（商品名にチェック）\n\n### サイバーダックからファイルをダウンロードする方法\n\n1. kkpliをクリック\n2. ritemをクリック\n3. downloadクリック\n4. 日付見て一番新しいファイルをWクリック\n\n### normal-item-titleのCSV作成\n\n1. SKU管理番号の列はいらないので列ごと削除\n2. 1行目にフィルターをかけて商品名の列を空白のみにする\n3. シートが空白のセルになったらA2とB2から一番下まで範囲選択して削除\n4. **【0/0限定★エントリーで2人に1人全額ポイントバック】**を商品名の頭に入れる\n   - **【】と商品名の前に半角空白入れる**\n\n### 気をつけたいこと\n\n- **新商品があれば編集した後に新商品の商品コードが入ってるか確認する**\n\n### CSVの保存方法\n\n1. 名前を**normal-item-title-○○**にする（○○はキャンペーンがある日付）\n2. 更新用と削除用のファイルを作って保存\n\n**POINT：**わかりやすいように楽天CPのファイルを作って、その中にCPの日のファイルを作って、その中に更新用と削除用を作ったら何かあった時に見返せるので保存しておきましょう。\n\n### グーグルドライブの保存方法\n\n1. マイドライブ → 楽天ポイントバックキャンペーンの順番にファイルを開く\n2. 過去のファイルが出てくるので新しく○月○日(20○○)の名前でファイルを作ります\n3. 日付ファイルの中に更新用と削除用を準備し、作ったCSVを入れます\n4. 今作ったファイルは更新する時に使うのCSVなので更新用ファイルに入れてください\n\n### normal-item-selectの作り方\n\n1. 今日から遡って一番近い日のファイルの更新用ファイルを開けたら、2つのファイルがあるのでnormal-item-selectのファイルを開けます\n2. このファイルに新規出品した商品コードを追加していきます\n3. 出品マスタがメニューバーのスプレッドシートの中に入ってるので開きます\n4. ✓が入っているところは楽天CPに登録できていて、□はCPまだ未登録の状態なので、未登録の商品コードを追加していきます\n\n**気をつけたいこと：**\n- **単品もバリエーションもこの形を間違えると正しくアップロードできないので、この形は絶対に崩さないようにしてください**\n\n5. 新規出品を追加できたらD列の商品オプション項目名が前回のキャンペーンの日付になっているので、置換で2/5になっているのを3/5に全部変える\n6. **日付を変えたら、前の日付が残っていないか⌘Fで調べてください**\n7. 名前をnormal-item-select-○○にする（○○はキャンペーンがある日付）\n8. 更新用ファイルに入れます',

    itemName: 'キャッシュバックキャンペーン設定',
    text: '### ★更新用ファイルを作るタイミングで削除用ファイル（item-delete-option）を作る理由\n\n商品は日々どんどん追加されていきます。\nこのCPは毎回同じ人が作業するとは限らないので、誰が見てもわかる必要があります。\n\n**更新用ファイルを作るタイミングで削除用ファイルを作らなかったら起こる問題**\n- どこからが新規出品かわからなくなる\n\n**更新用ファイルを作るタイミングで削除用ファイル（normal-item-title）を作らない理由**\nCPの期間中に商品名を変えたのに、CP前にファイルを作ってたら商品名変更前のが上がってしまいます。なので削除用のタイトルはCPが終わってから作成します。\n\n### item-delete-option作成\n\n1. 削除用を開くと2つのファイルが出てくるので、item-delete-optionを開きます\n2. A列の商品管理番号に単品出品は商品コード、バリエーション商品は親コードを追加します\n3. B列の選択肢タイプはSのみ\n4. C列の商品オプション項目名の日付が前のままになっているので置換で今回の日付に変える\n5. **日付を変えたら、前の日付が残っていないか⌘Fで調べてください**\n\n### item-delete-option保存\n\n1. item-delete-option-○○にする（○○はキャンペーンがある日付）\n2. 保存先：\n   - 自分の削除用のファイルに入れる\n   - グーグルドライブの削除用ファイルにいれる\n\n### item-select-title作成（CP終了後）\n\n1. RMSからCSVをダウンロードしたら商品名の前にキャンペーンの文言と空白が入ってるので置換で削除します\n2. ⌘FでCPの内容が全部消えているか確認します\n3. item-select-title-○○と名前をつけて2ヶ所に保存',

    text: '### ログイン方法\n\n1. 楽天のLINEはビジネスアカウントでログインします\n2. 店舗名をクリックします\n\n### 画像選択\n\n1. リッチメッセージをクリックすると過去に配信したLINEが出てきます\n2. 日付が一番新しいCPの…をクリックしてコピーします\n3. アイテム名の日付のみ変える\n4. 画像の変更をクリック\n5. 画像をそのまま適用するをクリック\n6. 1040_1040.jpgをドラッグ&ドロップで入れる\n7. 違うタブで開いていたリンクを入れる\n\n### LINEの作り方\n\n1. メッセージリストをクリック\n2. 配信済みをクリック\n3. …をクリックしてコピーする\n\n### キャンペーンの見方\n\nキャンペーンカレンダーを確認し、例えば5日は：\n- スーパーセール\n- 0と5のつく日\n\n2つのイベントが被っているのでLINEにもその旨を入れます\n\n**例：**\n```\n本日は見逃せないお得な1日\n3つのキャンペーン同時開催！\n楽天スーパーセール\nポイントキャッシュバックキャンペーン\n0と5のつく日（ポイント最大4倍）\nさらに…\n画像をタップしてエントリーすると\n最大10,000ポイントプレゼント！\nお買い物前のエントリーをお忘れなく！\n今だけのチャンスです\n```\n\n### LINEの文章の作り方\n\n配信日時はCP当日の18：03\n\n**なぜこの時間？**\n他の公式LINEが18時にしているところが多いので紛れないようにするため少し時間をずらしてます\n\nテキストを入れたらプレビューで見れるので：\n- イベントが全部入っている\n- 改行や絵文字を入れて見やすく\n- なるべく簡潔かつ魅力的に\n- 1番頭にお得感が伝わる内容を持ってくる\n\n### LINEの画像の設定方法\n\n1. リッチメッセージを選択をクリック\n2. 楽天CPの1番上にある画像がリッチメッセージで作った画像なので、選択をクリック\n\n**POINT：**\nプレビューで画像があってるか、リンク先があっているか再度確認してください。\nプレビューの画像をクリックしたらリンク先確認できます。\n\n3. 最後に配信予約クリック',

    itemName: 'ヤフショLINE配信',
    text: '### 前提条件\n\n2026年2月現在、ヤフショのLINEの登録者数は1787人です。\n\nライトプランでは月間に5000通までLINEを配信することが可能です。\n5000件をオーバーした場合、5000件に達するまでお客様に配信して**5000件を超えた分は配信されません**。\n\n今の登録者数でいうと3回配信したら5000通に達します。\n（1787*3=5361 361人には配信されません）\n\n**この場合は月に3回まで配信します。\n（つまり5000通に達する回数まで配信します）**\n\n### LINE配信の日を考えるコツ\n\n配信する日の優先順位：\n\n1. **大型セールかつボーナスストアに参加している日**\n   - ボーナスストアはストア負担で全品5%OFFしているのと同じことなので、できるだけこの日に集客をしたいというのが前提です。\n\n2. **ボーナスストアに参加している日かつポイント還元率が最大の日**\n\n3. **イベント日で1番ポイント還元率が高い日**\n\n**※ただし2日連続で配信しても効果は薄い**\n\n### 大型セールの種類と優先順位\n\n1. **超PayPay祭り** （楽天でいうとスーパーセール）\n   - 最大還元率が突出していてCMも流れる\n   - モール＋ストア施策が重なる年数回だけの"本命イベント"\n\n2. **ブラックフライデー、年末年始セール** （楽天でいうとブラックフライデー）\n   - 年に1回だけ。ポイント倍率強化、クーポン重複多め\n\n3. **爆買いWEEK** （楽天でいうとお買い物マラソン）\n   - 年に4〜6回程度、超PayPay祭ほどの大型ではない\n   - 季節の切り替わり前後に実施されやすい\n\n4. **5のつく日・プレミアムな日曜** （楽天でいうと0と5のつく日）\n   - 毎月5の付く日や日曜日に開催される\n   - 定番になっているのでお客様も覚えていて、特に集客しなくても人は集まる\n\n### 配信日の決定手順\n\n1. イベントカレンダーシートの設定したい月を開く\n2. カレンダーを確認して候補日を選定\n3. 超PayPay祭りは2日候補がありますが**初日にLINEを配信します**\n\n理由は以下の通りです：\n- **初速でSEOを上げるため**\n- **LINEの配信時間は18：03分にしています。その日に開封されるとは限らないので最終日に設定すると気が付かずにイベントが終わる可能性があります**\n\n4. 結果決まった配信日をカレンダーに○を入力します',

    itemName: 'ヤフショLINE配信',
    text: '### LINEの配信内容\n\n開催中のイベント、ボーナスストア参加の有無を赤四角の部分から確認した上で文章を考えてください。chatGPTを使用するのもおすすめです！\n\n**あなただけのタイムセールは一度商品ページを訪れたお客様にだけ配信されるのでLINEの配信としては不適切なので入れる必要はありません**\n\n### 配信文章のポイント\n\n以下のポイントはしっかり押さえた上で、個性を出してください！\n\n- **1番頭にお得感が伝わる内容を持ってくる**\n  - 読み進めてもらうために開催中のキャンペーンやポイント還元率などをTOPに\n\n- **なるべく簡潔かつ魅力的に**\n  - 長いとそもそも読んでもらえません。できるだけ文字を削ることにこだわって\n  - どれだけ長くても超PayPay祭りの例ぐらい\n\n- **読みやすいように改行を入れる**\n\n- **その日の開催イベントは全て記載する（文章のTOPに）**\n\n- **その日の最大ポイント還元率は必ず記載する（文章のTOPに）**\n\n- **2点以上購入で200円OFFクーポンを同時に配信するのでそれの訴求も行う**\n\n### 配信例\n\n**ボーナスストア＋5％対象日**\n\nボーナスストアとは、\n対象ストアでの購入で\nポイント還元が上乗せされる仕組みです。\n\n本日は＋5％還元\n【最大〇〇％ポイント還元】\n\n2点以上購入で200円OFFクーポンも併用OK！\nいつもよりお得なタイミングです',

  item_ヤフショLINE配信_s4: {

    itemName: 'ヤフショLINE配信',
    text: '### リッチメッセージの作成\n\n1. 公式LINEにログインします\n   - **ヤフショと楽天でログイン方法が異なるので注意**\n   - Yahoo! JAPAN IDをクリック\n   - ログイン情報を入れてログインする\n   - 店舗名をクリック\n\n2. リッチメッセージを作成\n   - リッチメッセージをクリック\n   - 作成をクリック\n\n3. アイテム名を以下のように設定\n   ```\n   2個以上購入で200円OFF（○○○○年○○月）\n   ```\n\n4. 画像のアップロード\n   - 画像セクションの選択をクリック\n   - 画像をそのまま適用するをクリックして画像をアップロード\n\n5. アクションの設定\n   - リンクを選択\n   - URL欄を埋める\n\n6. クーポンURLの取得\n   - ストアクリエイターを開く\n   - 集客・販促 → クーポン → クーポン設定をクリック\n   - ⌘F（コマンドF）で「2点以上購入で200円OFFクーポン」を検索\n   - 公開日時と終了日時を確認して、LINEを配信する月に1ヶ月間通してかかっているクーポンを探す\n   - そのクーポンのURLをクリックして、URLを全てコピー\n\n7. 設定完了\n   - コピーしたURLをリッチメニュー設定画面のURL欄に貼り付け\n   - アクションラベル欄には「リンクに移動」と入力\n   - 保存をクリック\n\n### メッセージの配信予約\n\n1. メッセージを作成をクリック\n2. 配信日時をカレンダーを見ながら設定\n\n**LINEの配信時間は18：03に設定します**\n- 多くの公式LINEが18：00などキリのいい時間に配信を行うため、他の通知で埋もれてしまう可能性があります\n- そのためあえて少しずらして配信しています\n\n3. 配信設定\n   - **LINE VOOMに投稿のチェックはデフォルトでついてしまうので、必ず手動で外してください**\n\n4. テキスト入力\n   - テキスト欄にはその日のイベントに合わせて考えた内容の文章を貼り付け\n   - **配信日によってイベントや倍率が異なるので、必ず配信日ごとに文章を考える必要があります**\n   - **右側にプレビューが表示されるので改行などを入れる際の参考にしてください**\n\n5. リッチメッセージの追加\n   - 追加ボタンを押して先ほど作成したリッチメッセージを付け加える\n   - 右のマークをクリック → リッチメッセージを選択をクリック\n   - 先ほど作成したリッチメッセージを選択\n\n6. 配信予約\n   - 配信予約をクリックして1日分の予約完了\n   - これを配信する日数分設定\n\n7. 最終確認\n   - **LINE上の配信予約日とカレンダーの○の位置が正しいかを確認**\n   - 完了チェックにチェックを入れて、上長に報告して完了',

    text: '### 店舗クーポンとは <!-- page:7 -->\n\nこのマニュアルでは主に**①店舗が詳細な設定をして発行するクーポン**の設定方法を説明します。\n\n**一括定期クーポンでは補いきれない商品のクーポンを発行することが目的です**\n\n#### 例\n- **2個以上購入で200円OFF**\n- **商品指定の割引クーポン**\n\n**注意：** メーカーによって『ブランドの価値を守るために定価販売を厳守してください その代わりクーポンやポイントの付与は自由です』というスタンスの商品があります。この決まりを破ると商品を卸してもらえなくなるので遵守しています\n\n### 設定方法 <!-- page:8-19 -->\n\n#### 1. アクセス方法\n\n1. ストアクリエイタープロの集客・販促をクリック\n2. クーポンをクリック\n3. クーポン設定をクリック\n\n#### 2. イベントカレンダーでの確認 <!-- page:9-10 -->\n\n1. **イベントカレンダー**シートの設定したい月を開く\n2. ここに入力されている内容が1行1クーポンの意味になっています\n\n**色分けのルール：**\n- **設定不要** → 前月までかけていたクーポンがもうその商品を取り扱わないなどの理由で不要になった場合\n- **赤文字** → 新しく追加になった、もしくは値段が変更になった場合\n\n#### 対象者\n- **出品マスタの備考欄にクーポン設定が必要な旨が書いてある商品を出品した担当者**\n- **クーポンの値段の変更指示などがあった場合**\n\n**重要：** **赤文字で追加や変更を行なってください**\n作業のフロー上赤文字にしておかないと、そのクーポンの新規発行、クーポンの値段変更、商品の追加が『誰も気が付かず漏れ続ける』ことになります。\n\n#### 3. 新規クーポン作成 <!-- page:11 -->\n\n1. 新規発行をクリック\n\n#### 4. クーポン名とクーポンの説明文 <!-- page:12 -->\n\n**クーポン名やクーポンの説明文はお客様にも表示されます。以下のルールに沿って設定をお願いします**\n\n- **クーポン名:** 商品指定クーポン(○○○○円OFF)何度でも使用可能\n- **クーポンの説明文:** 特定の商品で何度でも使用できるクーポンです。\n\n#### 5. クーポンのカテゴリと値引き設定 <!-- page:13 -->\n\n- **クーポンのカテゴリ:** 全商品共通で「その他」を選択\n- **値引き:** 基本的に定額値引きしか使用しません。スプレッドシートに記載されている割引率を設定してください\n\n#### 6. 公開期間の設定 <!-- page:14 -->\n\n**公開範囲のルール:**\n- **公開期間の上限:** 最大90日間\n- **開始日:** 当日以降で設定可能\n\n**新商品などで月の途中で設定する場合（例えば2月14日に設定する場合）**\n2月15日（翌日）〜2月末（2/28）までを公開範囲に設定します\n\n**この設定+イベントカレンダーシートに赤文字で追加することで翌月以降のフローに乗ってきます**\n\n#### 7. 公開範囲の設定 <!-- page:15 -->\n\n**必ず「表示」を選択します**\n\n**非表示の場合は設定をしてもクーポンがお客様に表示されません**\n\n#### 8. クーポン画像とリンク先URLの設定 <!-- page:16-17 -->\n\n**クーポン画像ファイル名:**\nファイル名は以下の構成になっています。\n- 例: `coupon_2300.jpg`\n- （coupon_○○○.jpg ○の部分は割引率100円OFFなら100）\n\n**リンク先URL:**\n全てのクーポンに関して以下の商品一覧のURLに設定してください\n```\nhttps://store.shopping.yahoo.co.jp/phatee/search.html?p=#CentSrchFilter1\n```\n\n**2026年2月現在で以下のクーポン画像は設定ずみなので割引率に合わせてファイル名に数字を入れるだけでOKです。**\n\n利用可能な画像：50円、100円、150円、200円、300円、400円、500円、600円、700円、800円、900円、1000円、1100円、1200円、1300円、1400円、1500円、1600円、1700円、1800円、1900円、2000円、2100円、2200円、2300円、2400円、2500円、2600円、2700円、2800円、2900円、3000円\n\n**新規にアップロードが必要な場合はマニュアルの通りのルールでクーポン画像の名前を設定してください。（他の人も使用できるように）**\n\n#### 9. 対象商品の設定 <!-- page:18 -->\n\n1. クーポン適用商品のラジオボタンをクリックして窓を出す\n2. に設定する商品の商品管理番号を入力する\n\n**重要：バリエーションのある商品に設定する場合も親商品管理番号は使わず、各商品ページの商品管理番号を入力する**\n\n例：\n- para001-029\n- a001-029\n\n3. 最後に1番下までスクロールして確認ボタンを押し完了\n\n#### 10. 完了チェック <!-- page:19 -->\n\n**最後にカレンダーシートの設定したクーポンの完了チェック欄にチェックをいれて全ての設定が完了したら、ダブルチェックをした後に上長に報告をお願いします。**',

    itemName: 'あなただけのタイムセール',
    text: '### イベントカレンダーの見方 <!-- page:5-7 -->\n\n1. **イベントカレンダーシート**の設定したい月を開く\n2. **あなただけのタイムセール**の行を設定していく\n\n#### プロモーションパッケージについて\n- 弊社はプロモーションパッケージに加入している\n- 全ストア対象のキャンペーンに加えて、各日付に入っている%分が**ヤフショ負担**で当店から購入したお客様にポイント還元される\n- この部分は気にする必要はない\n\n#### ボーナスストアについて\n- ボーナスストアに参加する日にだけ関わる\n- つまり**緑枠**の日にだけ当店から購入したお客様にポイント還元される\n- 弊社は優良店舗なので合計2+3の**合計5%がお客様に還元される**\n\n### タイムセールに参加する日を考えるコツ <!-- page:8-10 -->\n\n**前提として、お客様が"集まる""購入したい"日はポイント還元が高い日 → イベント時に合わせて設定する**\n\n#### ①ボーナスストアに参加する日は必ず参加する\n- ボーナスストアは**5%店舗負担**でポイント還元するので利益率が5%下がる\n- 弊社が目標としている利益率は**15%**\n- その日にタイムセールを打つと利益率がさらに下がるので**利益率が25%以上の商品だけ**に絞ってタイムセールを設定\n- **使用するマークは△**\n\n#### ②通常のイベント時にも参加する\n- プレミアムな日曜日\n- ゾロ目の日\n- ヤフショ感謝デー\n- 爆買いウィークなど\nに合わせて**利益率15%以上の商品だけ**設定\n- **使用するマークは◯**\n\n### 設定手順\n1. ボーナスストア参加日全てに**△**のマークを入れる\n2. 通常のイベント時（3以上の数字が入っている日）に**◯**のマークを入れる\n   - **すでに△が入っている場合は不要（必ず△を優先）**',

    itemName: 'あなただけのタイムセール',
    text: '### 基本設定 <!-- page:12-13 -->\n\n1. ストアクリエイターを開く\n2. **集客・販促** → **あなただけのタイムセール** を開く\n3. 設定したい月をクリックして**新規作成**をクリック\n\n### 日付とグループの設定 <!-- page:14-15 -->\n\n**△の日と◯の日を別々に設定する必要がある**\n\n#### 管理名称の設定\n- **△の日付を設定する場合**：`利益率25%以上のみ(〇〇月分)`\n- **◯の日付を設定する場合**：`利益率15%以上のみ(〇〇月分)`\n\n### 対象商品の設定 <!-- page:16-20 -->\n\n1. **対象商品1**のラジオボタンをクリック\n2. スプレッドシートの『タイムセール設定商品一覧』シートを開く\n3. **スクリプト処理** → **あなただけのタイムセール情報取得** ボタンを押す\n4. 「商品マスタの取得が完了しました」のポップアップが出るまで待つ\n5. **OKボタン**を押す\n\n#### 商品管理番号のコピー\n- **赤枠**：◯（利益率15%以上）の商品の商品管理番号\n- **青枠**：△（利益率25%以上）の商品の商品管理番号\n\n**※商品はリアルタイムで自動更新されるのでコピーするだけでOK**\n\n### 最終設定 <!-- page:20 -->\n\n1. コピーした商品管理番号を窓に貼り付け\n2. **割引率は必ず5%で設定**\n3. 下までスクロールしてチェックを入れる\n4. **登録ボタン**を押す\n\n### ◯の日付の設定 <!-- page:21 -->\n\n**◯の日付の設定も全く同じ手順。唯一違う点は以下の3点だけ：**\n\n1. 最初の日付の設定を**◯の日**に合わせる\n2. **◯の商品管理番号（赤枠）**をコピーする\n3. 管理名称を`利益率15%以上のみ(〇〇月分)`にする\n\n**⚠️ 設定をテレコにしてしまうと大幅に損をする可能性もあるので必ずダブルチェックをお願いします**\n\n### 完了報告 <!-- page:22 -->\n\n◯と△どちらも設定が完了したら、最後に**カレンダーシートの完了チェック欄にチェックを入れて上長に報告**をお願いします。',

const LSVG = '<svg width="14" height="14" viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zm-1 3H5a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-8h-2v8H5V8h8V6z"/></svg>';
const ml = (url, label) => '<a class="manual-link" href="' + url + '" target="_blank">' + LSVG + label + '</a>';
const canvaEmbed = (src) => src ? '<div class="canva-wrap"><iframe loading="lazy" src="' + src + '" allowfullscreen allow="fullscreen"></iframe></div><p class="canva-note">スライドをスクロールして該当ページをご確認ください</p>' : '';

const messagesEl = document.getElementById('messages');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const scrollBottom = () => messagesEl.scrollTop = messagesEl.scrollHeight;

function showTyping() {
  const row=document.createElement('div'); row.className='msg-row bot'; row.id='typing-row';
  const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
  const b=document.createElement('div'); b.className='bubble bot';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}
function removeTyping() { const t=document.getElementById('typing-row'); if(t) t.remove(); }

function addUserMsg(text) {
  const row=document.createElement('div'); row.className='msg-row user';
  const av=document.createElement('div'); av.className='avatar user'; av.textContent='あ';
  const b=document.createElement('div'); b.className='bubble user'; b.style.whiteSpace='pre-line'; b.textContent=text;
  row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
}

function makeChoices(flow, b) {
  if (!flow.choices || !flow.choices.length) return;
  const choicesEl=document.createElement('div'); choicesEl.className='choices';
  flow.choices.forEach((c,i) => {
    const btn=document.createElement('button');
    if (c.wip) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+(i+1)+'</span>'+c.label+'<span class="badge-wip">準備中</span>';
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow('wip'); });
    } else if (c.free) {
      btn.className='choice-btn free';
      btn.innerHTML='<span class="num free-icon">✎</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow('free_input'); setTimeout(()=>input.focus(),700); });
    } else if (c.back) {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num back">←</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow(c.next); });
    } else {
      btn.className='choice-btn';
      btn.innerHTML='<span class="num">'+(i+1)+'</span>'+c.label;
      btn.addEventListener('click',()=>{ addUserMsg(c.label); showFlow(c.next); });
    }
    choicesEl.appendChild(btn);
  });
  b.appendChild(choicesEl);
}

function showFlow(key) {
  const flow=flows[key]; if(!flow) return;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot';
    if(flow.html){
      b.innerHTML=flow.html;
    } else if(flow.text){
      let html = '';
      if(flow.page){
        html += '<div style="background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;color:#0F6E56;font-weight:600;">📖 マニュアル '+flow.page+' ページをご確認ください</div>';
      }
      if(flow.canvaUrl){
        html += ml(flow.canvaUrl, (flow.itemName||'')+'マニュアルを開く');
      }
      if(flow.embedUrl){
        html += canvaEmbed(flow.embedUrl);
      }
      html += '<div style="margin-top:8px;">' + markdownToHtml(flow.text) + '</div>';
      b.innerHTML = html;
    }
    makeChoices(flow,b);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  },600);
}

const GAS_PROXY = 'https://script.google.com/macros/s/AKfycbxMuSgsGyN2eCZqYqzEGiCwGaR-6XwUFLl7xeD2fUqeBj1Na9vbdZzrjFbhcVm7hieK/exec';
let conversationId = '';

async function handleSend() {
  const text=input.value.trim(); if(!text) return;
  addUserMsg(text); input.value='';
  showTyping();
  try {
    const res = await fetch(GAS_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
  query: text + " 業務 マニュアル 手順 方法",
  conversation_id: conversationId
})
    });
    const data = await res.json();
    conversationId = data.conversation_id || '';
    removeTyping();
    const row=document.createElement('div'); row.className='msg-row bot';
    const av=document.createElement('div'); av.className='avatar bot'; av.textContent='KB';
    const b=document.createElement('div'); b.className='bubble bot';
    b.innerHTML = markdownToHtml(data.answer || 'エラーが発生しました。');
    const choicesEl=document.createElement('div'); choicesEl.className='choices';
    const related = [];

    if(related.length===1 && related[0].exact){
      const rb=document.createElement('button'); rb.className='choice-btn';
      rb.innerHTML='<span class="num">1</span>'+related[0].key.replace('item_','').replace(/_/g,' ')+'の手順を見る';
      rb.addEventListener('click',function(){ addUserMsg('手順を見る'); showFlow(related[0].key); });
      choicesEl.appendChild(rb);
    } else if(related.length > 0){
      const lbl=document.createElement('div');
      lbl.style='font-size:12px;color:#888;margin-bottom:4px;';
      lbl.textContent='どの業務についてですか？';
      choicesEl.appendChild(lbl);
      related.forEach(function(r,i){
        const rb=document.createElement('button'); rb.className='choice-btn';
        rb.innerHTML='<span class="num">'+(i+1)+'</span>'+r.label+'の作業';
        rb.addEventListener('click',function(){ addUserMsg(r.label+'の作業'); showFlow(r.key); });
        choicesEl.appendChild(rb);
      });
    } else {
      ['dept_発送','dept_納品','dept_バックオフィス','dept_棚卸し'].forEach(function(k,i){
        if(!flows[k]) return;
        const rb=document.createElement('button'); rb.className='choice-btn';
        const lbl=k.replace('dept_','');
        rb.innerHTML='<span class="num">'+(i+1)+'</span>'+lbl+'の作業';
        rb.addEventListener('click',function(){ addUserMsg(lbl+'の作業'); showFlow(k); });
        choicesEl.appendChild(rb);
      });
    }

    const backBtn=document.createElement('button'); backBtn.className='choice-btn';
    backBtn.innerHTML='<span class="num back">←</span>最初に戻る';
    backBtn.addEventListener('click',function(){ addUserMsg('最初に戻る'); showFlow('start'); });
    choicesEl.appendChild(backBtn);
    b.appendChild(choicesEl);
    row.appendChild(av); row.appendChild(b); messagesEl.appendChild(row); scrollBottom();
  } catch(err) {
    removeTyping();
    console.error(err);
  }
}


function markdownToHtml(md) {
  if (!md) return '';
  return String(md)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/
/g, '<br>');
}

function findRelatedFlows(query){
  const q = query.replace(/[？?！! 　。、]/g,'').trim();
  if(q.length < 2) return [];

  const scores = {};

  Object.keys(flows).forEach(function(key){
    if(key==='start'||key==='wip'||key==='free_input') return;
    if(key.includes('_s')) return; // セクションは除外
    if(!key.startsWith('item_')) return;

    const flow = flows[key];
    const content = [
      key.replace('item_','').replace(/_/g,' '),
      flow.text||'',
      flow.itemName||''
    ].join(' ');

    let score = 0;
    // クエリを1文字ずつではなく単語として検索
    const words = q.length > 4 ? [q, q.slice(0,Math.ceil(q.length/2)), q.slice(Math.ceil(q.length/2))] : [q];
    words.forEach(function(w){
      if(w.length < 2) return;
      const count = (content.match(new RegExp(w,'g'))||[]).length;
      score += count * (w.length); // 長い一致ほど高スコア
    });

    if(score > 0) scores[key] = score;
  });

  // スコア上位3件を返す
  return Object.keys(scores)
    .sort(function(a,b){ return scores[b]-scores[a]; })
    .slice(0,3)
    .map(function(key){
      const name = key.replace('item_','').replace(/_/g,' ');
      return {key: key, label: name, exact: scores[key] > 10};
    });
}

sendBtn.addEventListener('click', handleSend);
var isComposing=false;
input.addEventListener('compositionstart',function(){isComposing=true;});
input.addEventListener('compositionend',function(){isComposing=false;});
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
    e.preventDefault();
    if (input.value.trim() !== '') {
      handleSend();
    }
  }
});
showFlow('start');
